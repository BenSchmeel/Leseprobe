hatte er richtig Angst und lief schnell weg.", "is_phrase": false, "pos": "Adverb"}, "rocky": {"def": "Rocky ist hier ein Spitzname oder Rufname einer Person, die dem Punk-Stil zugehört. Es handelt sich um einen typischen Szene-Namen, wie er in der Punk-Kultur verwendet wurde.", "example": "In unserer Clique kannte jeder Punk Rocky – er war immer dabei, wenn es Ärger gab.", "is_phrase": false, "pos": "Substantiv (Eigenname / Spitzname)"}, "rolle": {"def": "Die 'Rolle' bedeutet hier, welchen Platz oder welche Bedeutung jemand im Leben hat – also wer man ist und wozu man da ist. Charlie fragt sich, warum er auf der Welt ist und was er im Leben tun soll.", "example": "Nach dem Schulabschluss fragte sich Marie, welche Rolle sie in der Gesellschaft spielen möchte.", "is_phrase": false, "pos": "Substantiv"}, "ruhig": {"def": "Wenn jemand ruhig wird, hören die starken Gefühle oder die Aufregung in ihm auf. Die Person fühlt sich innerlich entspannt und ausgeglichen.", "example": "Als sie das Ergebnis hörte, wurde sie auf einmal ruhig und konnte klar denken.", "is_phrase": false, "pos": "Adjektiv / Adverb"}, "run": {"def": "Ein Run ist beim Baseball ein Punkt, den eine Mannschaft erzielt, wenn ein Spieler alle Bases durchläuft und das Ausgangsfeld wieder erreicht. 'Einen Run zurückliegen' bedeutet, dass die andere Mannschaft einen Punkt mehr hat.", "example": "Die Heimmannschaft lag zwei Runs zurück, kämpfte sich aber in der letzten Runde noch zurück.", "is_phrase": false, "pos": "Substantiv"}, "runner": {"def": "Ein Runner ist beim Baseball ein Spieler, der sich bereits auf einer der Bases befindet und versucht, zur Heimbase zu laufen, um einen Punkt zu erzielen.", "example": "Der Runner auf der zweiten Base wartete auf den richtigen Moment, um zur nächsten Base zu sprinten.", "is_phrase": false, "pos": "Substantiv"}, "sache": {"def": "Wenn etwas 'eine große Sache' ist, bedeutet das, dass es sehr wichtig, beeindruckend oder besonders gut ist. Man benutzt diesen Ausdruck, um zu zeigen, dass man von etwas sehr begeistert ist.", "example": "Das Konzert gestern war wirklich eine große Sache – alle Leute in der Stadt haben darüber gesprochen.", "is_phrase": true, "pos": "Substantiv"}, "sachen": {"def": "Hier bedeutet 'Sachen' Ereignisse oder Dinge, die passiert sind. Man benutzt das Wort, wenn man nicht genau sagen will, worum es geht.", "example": "Bei solchen Sachen übertreibt sie nie, sie erzählt alles genau so, wie es war.", "is_phrase": false, "pos": "Substantiv"}, "sagte": {"def": "Das Wort bedeutet, dass eine Person etwas mit Worten ausgedrückt hat. Es zeigt an, dass jemand gesprochen hat.", "example": "Die Lehrerin sagte, dass der Test morgen stattfindet.", "is_phrase": false, "pos": "Verb"}, "sagten": {"def": "Wenn Ärzte jemandem sagen, dass er etwas tun oder lassen muss, dann geben sie eine medizinische Empfehlung oder Anweisung. Hier informierten die Ärzte die Mutter, dass ihr Kind mit dem Sport aufhören muss.", "example": "Die Ärzte sagten meiner Mutter, ich müsse mehr Wasser trinken.", "is_phrase": false, "pos": "Verb"}, "sah": {"def": "Dies ist die Vergangenheitsform von 'aussehen'. Es beschreibt, wie eine Person oder Sache früher von anderen Menschen wahrgenommen wurde, also welchen äußeren Eindruck sie machte.", "example": "Als Kind sah sie ihrer Mutter sehr ähnlich aus.", "is_phrase": false, "pos": "Verb"}, "sam": {"def": "Sam ist hier ein Vorname einer Person, die im Buch vorkommt. Es handelt sich um eine Figur, mit der die erzählende Person Zeit verbringt und die ihr wichtig ist.", "example": "Sam ist meine beste Freundin, und wir verbringen viel Zeit zusammen.", "is_phrase": false, "pos": "Eigenname"}, "sammelt": {"def": "Hier bedeutet 'Erfahrungen sammeln', dass man viele neue Dinge erlebt und dabei lernt. Man macht also verschiedene Erlebnisse, die man vorher noch nicht hatte.", "example": "Im Auslandsjahr hat sie viele neue Erfahrungen gesammelt.", "is_phrase": true, "pos": "Verb"}, "saßen": {"def": "Das ist die Vergangenheitsform von 'sitzen'. Es bedeutet, dass mehrere Personen an einem Ort eine Position eingenommen hatten, bei der ihr Körpergewicht auf einer Fläche ruhte.", "example": "Nach dem Spiel saßen alle Kinder zusammen auf dem Boden und aßen ihre Pausenbrote.", "is_phrase": false, "pos": "Verb"}, "scheint": {"def": "‚Es scheint so zu sein' bedeutet, dass etwas wahrscheinlich so ist, aber man nicht ganz sicher ist. Man glaubt es, kann es aber nicht mit Sicherheit sagen.", "example": "Er hat nicht geantwortet – es scheint so zu sein, dass er noch schläft.", "is_phrase": false, "pos": "Verb"}, "schlafgewohnheiten": {"def": "Die Schlafgewohnheiten beschreiben, wie und wann jemand schläft – zum Beispiel wie lange, zu welcher Uhrzeit und wie regelmäßig. Hier macht sich die Mutter Sorgen, ob ihr Sohn genug und gut schläft, seit er nicht mehr zu Hause wohnt.", "example": "Seitdem meine Tochter an der Universität wohnt, mache ich mir Gedanken über ihre Schlafgewohnheiten und ob sie genug Ruhe bekommt.", "is_phrase": false, "pos": "Substantiv"}, "schlagen": {"def": "Einen Homerun schlagen bedeutet beim Baseball den Ball so stark und weit zu treffen, dass man alle Bases umrunden und einen Punkt erzielen kann. Es ist die beste und wertvollste Aktion, die ein Schlagmann im Baseball erreichen kann.", "example": "Der Spieler traf den Ball perfekt und schlug einen Homerun, worüber das ganze Stadion jubelte.", "is_phrase": true, "pos": "Verb"}, "schlau": {"def": "'Aus etwas schlau werden' bedeutet, etwas zu verstehen oder einen Sinn in etwas zu finden. Die Phrase wird oft verneint verwendet, wenn etwas sehr verwirrend oder unklar ist und man es nicht verstehen kann.", "example": "Der Brief war so kompliziert geschrieben, dass ich einfach nicht schlau daraus wurde.", "is_phrase": true, "pos": "Redewendung"}, "schlug": {"def": "Hier bedeutet 'schlagen' im Baseball: den Ball mit dem Schläger so hart treffen, dass man einen Punkt für das Team macht. Ein Homerun ist der größte Treffer beim Baseball.", "example": "Der Spieler schlug den Ball weit über den Zaun und lief alle Bases ab.", "is_phrase": false, "pos": "Verb"}, "schmutzigen": {"def": "Ein schmutziger Boden ist ein Boden, auf dem Staub, Dreck oder andere unerwünschte Dinge liegen, weil er nicht gereinigt wurde. Das Wort beschreibt hier, dass der Boden nicht sauber ist.", "example": "Nach der Party war der schmutzige Boden voller Krümel und Flecken.", "is_phrase": false, "pos": "Adjektiv"}, "schreibt": {"def": "Hier bedeutet 'schreiben', dass jemand Texte in Briefform verfasst und dabei Gedanken, Gefühle oder Beobachtungen aufschreibt. Charlie schreibt regelmäßig Briefe an eine Person, um ihr von seinem Leben und seinen Gedanken zu erzählen.", "example": "Sie schreibt jeden Abend in ihr Tagebuch, um ihre Gedanken und Gefühle festzuhalten.", "is_phrase": false, "pos": "Verb"}, "schule": {"def": "Die Schule ist ein Ort, wo Kinder und Jugendliche lernen. Hier meint es die Zeit oder den Alltag als Schüler, zum Beispiel den Weg nach Hause nach dem Unterricht.", "example": "Nach der Schule traf er sich immer mit seinen Freunden auf dem Spielplatz.", "is_phrase": false, "pos": "Substantiv"}, "schuljahrbuch": {"def": "Ein Schuljahrbuch ist ein gedrucktes Buch, das eine Schulklasse oder Schule am Ende eines Schuljahres zusammenstellt. Es enthält Fotos der Schüler und Lehrer und erinnert an die gemeinsame Zeit in der Schule.", "example": "Im Schuljahrbuch kann man die Fotos aller Mitschüler aus dem letzten Schuljahr sehen.", "is_phrase": false, "pos": "Substantiv"}, "schwanger": {"def": "Wenn eine Frau schwanger ist, wächst ein Baby in ihrem Bauch. Sie erwartet also ein Kind.", "example": "Meine Schwester ist schwanger – das Baby kommt im März.", "is_phrase": false, "pos": "Adjektiv"}, "schwester": {"def": "Eine Schwester ist ein Mädchen oder eine Frau, die dieselben Eltern hat wie man selbst. Sie gehört also zur direkten Familie.", "example": "Meine Schwester und ich sind zusammen aufgewachsen und verstehen uns sehr gut.", "is_phrase": false, "pos": "Substantiv"}, "schön": {"def": "Wenn jemand auf seine ganz eigene Art und Weise schön ist, bedeutet das, dass diese Person eine besondere, individuelle Schönheit hat, die nicht dem üblichen Standard entspricht. Diese Schönheit ist einzigartig und gehört nur zu dieser Person.", "example": "Sie ist nicht wie ein Model, aber auf ihre ganz eigene Art und Weise schön – ihr Lächeln und ihre Augen machen sie besonders.", "is_phrase": false, "pos": "Adjektiv"}, "schöne": {"def": "Etwas, das angenehm und gut aussieht oder sich gut anfühlt. Hier beschreibt es Wetter, das warm, sonnig und angenehm ist.", "example": "Das schöne Wetter im September hat uns zum Spazierengehen eingeladen.", "is_phrase": false, "pos": "Adjektiv"}, "schöner": {"def": "Das Wort beschreibt, dass eine Person oder Sache mehr Schönheit hat als eine andere. Es wird hier benutzt, um jemanden mit allen anderen zu vergleichen.", "example": "Sie tanzte schöner als alle anderen Mädchen in der Klasse.", "is_phrase": false, "pos": "Adjektiv (Komparativ)"}, "sechzehn": {"def": "Die Zahl 16, die hier das Alter einer Person angibt. Wenn man sagt, jemand 'ist sechzehn', meint man, dass diese Person 16 Jahre alt ist.", "example": "Meine Schwester ist sechzehn und geht noch zur Schule.", "is_phrase": false, "pos": "Numerale"}, "sehe": {"def": "Jemanden ansehen bedeutet, die Augen auf eine Person zu richten und sie aufmerksam zu betrachten. Man schaut auf das Gesicht oder den Körper einer Person und nimmt wahr, wie sie aussieht oder wirkt.", "example": "Er sah seinen alten Freund an und bemerkte, wie sehr er sich verändert hatte.", "is_phrase": false, "pos": "Verb"}, "seltsam": {"def": "Wenn etwas seltsam ist, wirkt es komisch oder ungewöhnlich und man versteht es nicht gut. Man findet es merkwürdig und es gefällt einem nicht besonders.", "example": "Ich finde es seltsam, dass er immer alleine isst und nie mit anderen redet.", "is_phrase": false, "pos": "Adjektiv"}, "sicht": {"def": "Die 'Sicht auf etwas' bedeutet die Art und Weise, wie jemand die Welt oder eine Situation wahrnimmt und bewertet. Es geht darum, wie eine Person denkt und fühlt, wenn sie die Dinge um sich herum betrachtet.", "example": "Nach seiner langen Reise hatte er eine neue Sicht auf das Leben in seiner Heimatstadt.", "is_phrase": false, "pos": "Substantiv"}, "sogar": {"def": "Man benutzt 'sogar', um etwas zu betonen, das überraschend ist oder mehr als erwartet. Es zeigt, dass etwas stärker oder extremer ist, als man denken würde.", "example": "Das Wetter war so schön, dass wir sogar im Oktober draußen sitzen konnten.", "is_phrase": false, "pos": "Adverb"}, "solche": {"def": "Das Wort 'solche' zeigt, dass man von einer bestimmten Art oder Gruppe von Dingen oder Personen spricht, die man gerade beschrieben hat oder gleich beschreiben wird. Hier meint es: Mädchen von dieser Art, wie sie oben gemeint sind – also natürlich wirkende Mädchen, keine Supermodels.", "example": "Solche Filme mag ich sehr – spannend, aber nicht zu brutal.", "is_phrase": false, "pos": "Pronomen"}, "solchen": {"def": "Das Wort 'solchen' zeigt, dass etwas zu einer bestimmten Gruppe oder Art von Dingen gehört, die gerade genannt wurden oder bekannt sind. Es ersetzt eine genauere Beschreibung und fasst ähnliche Dinge zusammen.", "example": "In seinem Rucksack hatte er Hefte, Stifte, Lineale und solche Dinge.", "is_phrase": false, "pos": "Pronomen"}, "sonderlich": {"def": "Das Wort 'sonderlich' bedeutet hier 'besonders' oder 'sehr' und wird meist in verneinten Sätzen benutzt. Man sagt 'nicht sonderlich viel', wenn man ausdrücken möchte, dass etwas wenig oder kaum vorhanden ist.", "example": "Das Essen heute hat mir nicht sonderlich gut geschmeckt.", "is_phrase": false, "pos": "Adverb"}, "sorge": {"def": "Eine Sorge ist ein schlechtes Gefühl, das man hat, wenn man glaubt, dass etwas Schlimmes passieren könnte. Hier bedeutet es, dass die anderen Menschen Angst hatten, dass der Vater einen Fehler machen würde.", "example": "Es gab die große Sorge, dass der neue Spieler unter Druck nicht gut genug spielen würde.", "is_phrase": false, "pos": "Substantiv"}, "sorgfältig": {"def": "Wenn man etwas sorgfältig macht, gibt man sehr gut auf Details acht und macht es genau und ordentlich. Man macht keine Fehler, weil man aufmerksam und geduldig arbeitet.", "example": "Sie hat die Briefe sorgfältig in einer Schachtel geordnet, damit sie nichts verliert.", "is_phrase": false, "pos": "Adverb"}, "spiel": {"def": "Ein Spiel ist hier ein einzelner sportlicher Wettkampf zwischen zwei Mannschaften, bei dem eine Mannschaft gewinnt und die andere verliert. In diesem Fall handelt es sich um ein Baseballspiel.", "example": "Die Mannschaft hat das Spiel in letzter Minute noch gewonnen.", "is_phrase": false, "pos": "Substantiv"}, "spieler": {"def": "Eine Person, die in einer Mannschaft einen Sport spielt. Hier ist damit ein Mitglied eines Collegeteams gemeint.", "example": "Der beste Spieler der Mannschaft hat heute drei Tore geschossen.", "is_phrase": false, "pos": "Substantiv"}, "sport": {"def": "Sport bedeutet körperliche Aktivitäten oder Bewegung, die man regelmäßig macht, um fit zu bleiben oder im Wettkampf zu spielen. 'Sport machen' ist eine feste Phrase und bedeutet, dass man aktiv an sportlichen Aktivitäten teilnimmt.", "example": "Mein Bruder macht jeden Tag Sport, er läuft morgens fünf Kilometer.", "is_phrase": true, "pos": "Substantiv"}, "sprachen": {"def": "Hier ist 'Sprachen' ein Schulfach, in dem man fremde Sprachen lernt, zum Beispiel Englisch oder Französisch. Im Text fragt der Bruder, ob die Punktzahl aus einem Schultest in Mathematik oder im Sprachunterricht kommt.", "example": "In der Schule sind meine Lieblingsfächer Mathe und Sprachen.", "is_phrase": false, "pos": "Substantiv (Plural)"}, "stelle": {"def": "Die Phrase ,sich etwas vorstellen' bedeutet, dass man ein Bild von etwas in seinem Kopf macht, obwohl es nicht wirklich vor einem ist. Man denkt an etwas und sieht es in seiner Fantasie.", "example": "Wenn ich Musik höre, stelle ich mir gerne vor, wie ich an einem Strand sitze und das Meer sehe.", "is_phrase": true, "pos": "Verb (feste Phrase: sich etwas vorstellen)"}, "supermodels": {"def": "Ein Supermodel ist eine sehr berühmte und erfolgreiche Frau, die als Modell für Kleidung oder Werbung arbeitet und oft in Zeitschriften oder im Fernsehen zu sehen ist. Supermodels gelten als besonders schön und sind bekannte Persönlichkeiten.", "example": "An den Wänden ihres Zimmers hingen Fotos von Supermodels aus großen Modezeitschriften.", "is_phrase": false, "pos": "Substantiv"}, "tages": {"def": "'Eines Tages' bedeutet: irgendwann in der Zukunft (oder Vergangenheit), zu einem unbekannten Zeitpunkt. Man benutzt diese Phrase, wenn man nicht genau weiß oder sagt, wann etwas passiert.", "example": "Eines Tages möchte ich eine eigene Wohnung haben.", "is_phrase": true, "pos": "Redewendung"}, "talente": {"def": "Menschen, die eine besondere natürliche Fähigkeit für etwas haben und darin sehr gut sind. Diese Personen können etwas ohne viel Übung besser als andere.", "example": "Der Trainer ist glücklich, weil er in seiner Mannschaft zwei echte Talente gefunden hat.", "is_phrase": false, "pos": "Substantiv"}, "team": {"def": "Eine Gruppe von Menschen, die zusammen Sport machen oder an etwas zusammen arbeiten. Alle Personen in der Gruppe haben ein gemeinsames Ziel.", "example": "Unser Team hat das Spiel gewonnen, weil alle gut zusammengearbeitet haben.", "is_phrase": false, "pos": "Substantiv"}, "teil": {"def": "Die Phrase 'ich für meinen Teil' bedeutet: was mich persönlich betrifft oder wie ich persönlich denke. Man benutzt sie, um die eigene Meinung oder das eigene Verhalten von dem anderer Menschen zu unterscheiden.", "example": "Alle in meiner Familie mögen Horrorfilme, ich für meinen Teil schaue lieber Komödien.", "is_phrase": true, "pos": "Redewendung"}, "thanksgiving": {"def": "Thanksgiving ist ein großes Familienfest in den USA und Kanada, das jedes Jahr im Herbst gefeiert wird. An diesem Tag essen Familien zusammen und sind dankbar für das, was sie haben.", "example": "Die ganze Familie reiste aus verschiedenen Städten an, um gemeinsam Thanksgiving zu feiern.", "is_phrase": false, "pos": "Substantiv"}, "toll": {"def": "Wenn etwas toll ist, ist es sehr schön, angenehm oder wunderbar. Man findet es sehr gut und freut sich darüber.", "example": "Es muss toll sein, jeden Sommer ans Meer zu fahren.", "is_phrase": false, "pos": "Adjektiv"}, "tolle": {"def": "Wenn etwas toll ist, ist es sehr gut, schön oder beeindruckend. Man verwendet das Wort, um große Begeisterung oder Freude über etwas auszudrücken.", "example": "Der Film war wirklich toll – ich habe ihn sehr genossen.", "is_phrase": false, "pos": "Adjektiv"}, "touchdown": {"def": "Ein Touchdown ist ein Punkt, den eine Mannschaft beim American Football macht, wenn ein Spieler den Ball in die Zielzone des Gegners bringt. Es ist der wichtigste und wertvollste Punkt in diesem Sport.", "example": "Die ganze Halle jubelte, als der Spieler den Touchdown erzielte und seiner Mannschaft zum Sieg verhalf.", "is_phrase": false, "pos": "Substantiv"}, "touchdowns": {"def": "Ein Touchdown ist ein Punkt, den man beim American Football erzielt. Hier steht das Wort als Symbol für sportliche Erfolge und Leistungen junger Männer.", "example": "Die jungen Sportler träumen davon, Touchdowns zu machen und eines Tages ihren Kindern davon zu erzählen.", "is_phrase": false, "pos": "Substantiv (Plural)"}, "traf": {"def": "Hier bedeutet 'treffen', dass man etwas mit einem Schlag oder Wurf an einer bestimmten Stelle berührt oder trifft. Der Ball wurde mit viel Kraft und Genauigkeit geschlagen.", "example": "Der Spieler traf den Ball so stark, dass er weit über das Tor flog.", "is_phrase": false, "pos": "Verb"}, "trinkt": {"def": "Eine Flüssigkeit in den Mund nehmen und schlucken. Hier trinkt das Mädchen gern Kakao, das bedeutet, es mag das warme Getränk und trinkt es oft.", "example": "Nach der Schule trinkt sie meistens eine Tasse Tee.", "is_phrase": false, "pos": "Verb"}, "trägt": {"def": "Hier bedeutet 'trägt', dass jemand ein Kleidungsstück anzieht und es am Körper hat. Es beschreibt, welche Art von Kleidung eine Person regelmäßig benutzt oder bevorzugt.", "example": "Meine Schwester trägt am liebsten bequeme Jeans und bunte T-Shirts.", "is_phrase": false, "pos": "Verb"}, "täte": {"def": "Das Wort 'täte' ist hier eine höfliche oder vorsichtige Form von 'tut' und bedeutet, dass etwas jemandem nützen oder guttun würde. Es drückt aus, dass etwas für jemanden hilfreich oder positiv wäre.", "example": "Ein bisschen frische Luft täte dir nach dem langen Arbeitstag sicher gut.", "is_phrase": false, "pos": "Verb (Konjunktiv II von 'tun')"}, "umkleidekabine": {"def": "Ein Raum in einer Sporthalle oder einem Stadion, wo sich Sportler vor und nach dem Sport umziehen. Dort treffen sich die Spieler einer Mannschaft auch, um miteinander zu sprechen.", "example": "Nach dem Spiel feierte die Mannschaft gemeinsam in der Umkleidekabine.", "is_phrase": false, "pos": "Substantiv"}, "unbekannten": {"def": "Eine Person oder Sache ist unbekannt, wenn man sie nicht kennt oder nicht weiß, wer oder was sie ist. Hier schreibt Charlie seine Briefe an eine Person, deren Name und Identität er nicht nennt.", "example": "Sie bekam einen Brief von einer unbekannten Person, deren Name nicht auf dem Umschlag stand.", "is_phrase": false, "pos": "Adjektiv"}, "vater": {"def": "Der Mann, dessen Kind man ist. Er ist ein Elternteil und lebt oft in derselben Familie wie das Kind.", "example": "Mein Vater arbeitet jeden Tag bis abends und kommt müde nach Hause.", "is_phrase": false, "pos": "Substantiv"}, "vaters": {"def": "Der Vater ist der männliche Elternteil eines Kindes. Er hat eine Familie und ist der Papa der Kinder, von denen hier gesprochen wird.", "example": "Die Kinder schauen sich gerne alte Fotos ihres Vaters an.", "is_phrase": false, "pos": "Substantiv"}, "verbindungspartys": {"def": "Eine Party, die von einer studentischen Verbindung (einer festen Gruppe von Studierenden an einer Universität) organisiert wird. Solche Partys sind oft bekannt für wildes Feiern und viel Alkohol.", "example": "Er war auf einer Verbindungsparty eingeladen, aber er fühlte sich dort unwohl, weil es sehr laut und chaotisch war.", "is_phrase": false, "pos": "Substantiv"}, "vergeigen": {"def": "Etwas vergeigen bedeutet, etwas durch einen Fehler oder schlechte Leistung zu verlieren oder zu ruinieren. Man sagt das, wenn jemand eine wichtige Aufgabe oder Situation nicht schafft und dadurch ein schlechtes Ergebnis entsteht.", "example": "Er hat die wichtige Prüfung leider vergeigt, weil er nicht genug gelernt hatte.", "is_phrase": false, "pos": "Verb"}, "vergesse": {"def": "Wenn man etwas vergisst, denkt man nicht mehr daran oder erinnert sich nicht daran, etwas zu tun. Hier bedeutet es, dass die Person hofft, dass sie sich daran erinnern wird, ihren Kindern etwas Wichtiges zu sagen.", "example": "Ich hoffe, ich vergesse nicht, meiner Mutter zum Geburtstag zu gratulieren.", "is_phrase": false, "pos": "Verb"}, "vermutlich": {"def": "Man benutzt 'vermutlich', wenn man denkt, dass etwas wahrscheinlich so ist, aber nicht sicher ist. Es zeigt, dass man etwas annimmt, weil es logisch klingt.", "example": "Er hat heute nicht geantwortet – er ist vermutlich sehr beschäftigt.", "is_phrase": false, "pos": "Adverb"}, "versucht": {"def": "Wenn man etwas versucht, bemüht man sich darum, etwas zu tun oder zu erreichen, auch wenn es schwierig ist. Hier bedeutet es, dass Charlie sich sehr anstrengt, seine eigene Rolle im Leben zu verstehen.", "example": "Das kleine Kind versucht verzweifelt, das schwierige Puzzle zusammenzusetzen.", "is_phrase": false, "pos": "Verb"}, "verzweifelt": {"def": "Hier bedeutet 'verzweifelt', dass Charlie sehr stark und mit großer Mühe versucht, etwas zu verstehen, obwohl es sehr schwer ist. Er bemüht sich so sehr, dass man spürt, wie wichtig und gleichzeitig wie schwierig es für ihn ist.", "example": "Sie versuchte verzweifelt, die komplizierte Aufgabe zu lösen, aber sie fand einfach keine Antwort.", "is_phrase": false, "pos": "Adverb"}, "viel": {"def": "Hier verstärkt 'viel' ein Adjektiv oder Adverb und zeigt, dass ein Unterschied sehr groß ist. Es bedeutet so viel wie 'deutlich' oder 'erheblich'.", "example": "Mit dem neuen Rezept schmeckt die Suppe viel besser als vorher.", "is_phrase": false, "pos": "Adverb"}, "vielleicht": {"def": "Das Wort drückt aus, dass etwas möglich ist, aber nicht sicher. Man weiß es nicht genau, aber es könnte so sein.", "example": "Vielleicht kommt sie morgen zu unserem Treffen, aber ich bin nicht sicher.", "is_phrase": false, "pos": "Adverb"}, "vorkommt": {"def": "Wenn etwas 'vorkommt', bedeutet das, dass es in einer Situation, einem Ort oder einer Zeit vorhanden ist oder existiert. Hier bedeutet es, dass ein Ball kein Teil dieser Zeit ist.", "example": "In meinem Alltag kommt kaum Sport vor, weil ich immer arbeite.", "is_phrase": false, "pos": "Verb"}, "vorstellt": {"def": "Etwas im Kopf als Bild denken oder sehen, obwohl man es nicht wirklich sieht. Man benutzt Informationen, die man hat, um ein Bild von etwas in seinem Kopf zu machen.", "example": "Wenn du mir sagst, dass das Haus sehr alt und klein ist, kann ich mir gut vorstellen, wie es aussieht.", "is_phrase": false, "pos": "Verb"}, "vorüber": {"def": "Wenn etwas vorüber ist, hat es aufgehört und existiert nicht mehr. Es beschreibt das Ende eines Zustands oder einer Zeit.", "example": "Der Sommer ist leider vorüber, jetzt wird es kälter.", "is_phrase": false, "pos": "Adverb"}, "väter": {"def": "Ein Vater ist ein Mann, der ein Kind hat. Hier bedeutet es, dass die jungen Sportler eines Tages erwachsen sein werden und selbst Kinder haben werden.", "example": "Die kleinen Jungen, die heute Fußball spielen, werden eines Tages selbst Väter sein.", "is_phrase": false, "pos": "Substantiv"}, "warf": {"def": "Vergangenheitsform von 'werfen': jemand bewegt seinen Arm und schickt einen Ball oder einen anderen Gegenstand durch die Luft in eine bestimmte Richtung. Der Ball fliegt dann dorthin, wohin man ihn gelenkt hat.", "example": "Der Junge warf den Ball so stark, dass er weit über den Zaun flog.", "is_phrase": false, "pos": "Verb"}, "warum": {"def": "Die Phrase 'warum auch immer' bedeutet, dass man den genauen Grund für etwas nicht kennt oder nicht nennen möchte. Man sagt damit, dass der Grund keine große Rolle spielt.", "example": "Er kommt zu unseren Treffen nie pünktlich, warum auch immer.", "is_phrase": true, "pos": "Redewendung"}, "was": {"def": "In diesen Sätzen leitet 'was' einen indirekten Fragesatz ein. Es steht nach Verben wie 'fragen', 'erzählen' oder 'sich fragen' und verbindet den Hauptsatz mit einer Frage, ohne dass man direkt fragt.", "example": "Sie hat mir erzählt, was sie an diesem Tag erlebt hat.", "is_phrase": false, "pos": "Relativpronomen / Fragewort (in indirekten Fragen)"}, "weise": {"def": "Die Phrase 'auf ihre ganz eigene Art und Weise' bedeutet, dass jemand etwas auf eine besondere, persönliche Methode oder in einem besonderen Stil tut, der nur für diese Person typisch ist. Es betont, dass diese Art einzigartig und individuell ist.", "example": "Sie singt auf ihre ganz eigene Art und Weise – nicht perfekt, aber sehr gefühlvoll.", "is_phrase": true, "pos": "Redewendung"}, "weiß": {"def": "Eine Information oder einen Sachverhalt im Kopf haben und sicher darüber sein. Man hat etwas gelernt oder erfahren und kann es sich vorstellen oder erinnern.", "example": "Ich weiß, dass der Zug um 8 Uhr abfährt, weil ich den Fahrplan gelesen habe.", "is_phrase": false, "pos": "Verb"}, "welt": {"def": "Mit 'Welt' ist hier gemeint, wie das Leben um einen herum aussieht und wie Menschen miteinander leben. Es geht um alles, was ein Mensch erlebt, sieht und versteht – die Gesellschaft und das Leben insgesamt.", "example": "Als Kind hatte sie eine eigene Sicht auf die Welt und stellte viele Fragen, die Erwachsene seltsam fanden.", "is_phrase": false, "pos": "Substantiv"}, "weniger": {"def": "'Mehr oder weniger' bedeutet: nicht genau, aber ungefähr so. Man sagt das, wenn etwas fast stimmt, aber nicht vollständig oder hundertprozentig.", "example": "Die Arbeit ist mehr oder weniger fertig – ich muss nur noch ein paar Kleinigkeiten korrigieren.", "is_phrase": true, "pos": "Redewendung"}, "werde": {"def": "Die Phrase 'da wird einer nicht schlau daraus' (oder als Aufforderung: 'werde da einer schlau daraus') bedeutet, dass etwas sehr unverständlich oder verwirrend ist und man es nicht erklären oder verstehen kann. Man sagt das, wenn eine Situation oder ein Mensch völlig unberechenbar oder unlogisch ist.", "example": "Er sagt mal ja, mal nein – werde da einer schlau daraus!", "is_phrase": true, "pos": "Redewendung"}, "wieso": {"def": "Das Wort 'wieso' fragt nach dem Grund oder der Ursache für etwas. Hier wird es benutzt, um zu sagen, dass der Sprecher den genauen Grund nicht kennt.", "example": "Ich weiß nicht genau, wieso, aber ich mag dieses Lied sehr.", "is_phrase": false, "pos": "Adverb"}, "wilden": {"def": "Hier bedeutet 'wild', dass etwas sehr laut, ausschweifend und unkontrolliert ist. Eine wilde Party ist eine Feier, bei der sehr viel Alkohol getrunken wird, laut gefeiert wird und es keine Regeln gibt.", "example": "Auf der wilden Party in der Studentenwohnung war die Musik so laut, dass die Nachbarn die Polizei riefen.", "is_phrase": false, "pos": "Adjektiv"}, "wirken": {"def": "Wenn jemand oder etwas auf eine bestimmte Weise wirkt, macht es auf andere Menschen einen bestimmten Eindruck. Man sieht oder fühlt etwas, auch wenn man es nicht sicher weiß.", "example": "Das alte Haus wirkt von außen sehr groß, aber innen ist es eigentlich klein.", "is_phrase": false, "pos": "Verb"}, "wirklich": {"def": "Dieses Wort verstärkt eine Aussage und zeigt, dass etwas in hohem Maß oder besonders stark zutrifft. Es betont, dass etwas tatsächlich so ist, wie man es sagt.", "example": "Das Konzert war wirklich schön – ich hatte eine tolle Zeit.", "is_phrase": false, "pos": "Adverb"}, "wirkliche": {"def": "Etwas ist wirklich vorhanden und nicht nur scheinbar so. Hier bedeutet es, dass die Talente echte, besondere Fähigkeiten haben und man das klar erkennen kann.", "example": "In dieser Schule gibt es ein paar wirkliche Ausnahmetalente, die später sicher Profis werden.", "is_phrase": false, "pos": "Adjektiv"}, "wirkt": {"def": "Wenn jemand oder etwas auf eine bestimmte Art wirkt, macht er oder es diesen Eindruck auf andere Menschen – auch wenn die Realität vielleicht anders ist. Hier bedeutet es, dass der Vater auf dem Foto den Anschein hat, glücklicher zu sein.", "example": "Auf den Fotos vom Urlaub wirkt sie immer sehr entspannt, obwohl sie oft gestresst war.", "is_phrase": false, "pos": "Verb"}, "wochen": {"def": "Eine Woche ist ein Zeitraum von sieben Tagen. Hier bedeutet 'einige Wochen', dass schon mehrere solcher Zeiträume vergangen sind, ohne dass der Bruder angerufen hat.", "example": "Sie hat einige Wochen auf eine Antwort gewartet, aber keine bekommen.", "is_phrase": false, "pos": "Substantiv"}, "wohnheim": {"def": "Ein Wohnheim ist ein Gebäude, in dem viele Menschen zusammen wohnen, oft Studenten oder Auszubildende. Jede Person hat ein eigenes kleines Zimmer, aber manchmal teilt man Bad oder Küche mit anderen.", "example": "Während seines Studiums wohnte er günstig in einem Wohnheim direkt neben der Universität.", "is_phrase": false, "pos": "Substantiv"}, "wollte": {"def": "Das Wort 'wollte' ist die Vergangenheitsform von 'wollen' und drückt einen Wunsch oder ein Ziel aus, das jemand früher hatte. Es beschreibt, was eine Person sich in der Vergangenheit gewünscht oder erhofft hat.", "example": "Als Kind wollte er immer Arzt werden.", "is_phrase": false, "pos": "Verb (Modalverb, Präteritum)"}, "worauf": {"def": "Das Wort 'worauf' verbindet hier den Satz mit einem vorher genannten Ereignis oder einer Sache. Es steht für 'auf die Feiertage' und wird zusammen mit 'sich freuen' benutzt: 'sich auf etwas freuen' bedeutet, dass man froh und gespannt ist, weil etwas Schönes kommen wird.", "example": "Morgen fahren wir in den Urlaub, worauf ich mich schon sehr freue.", "is_phrase": false, "pos": "Relativpronomen"}, "wunderschön": {"def": "Sehr schön, auf eine starke und beeindruckende Weise. Es ist eine verstärkte Form von 'schön'.", "example": "Der Sonnenuntergang über dem Meer war heute Abend wunderschön.", "is_phrase": false, "pos": "Adjektiv"}, "wusste": {"def": "Das Verb 'wissen' bedeutet, dass man eine Information oder ein Ergebnis sicher im Kopf hat, ohne raten zu müssen. Hier bedeutet es, dass die Person absolut sicher war, wohin der Ball fliegen würde.", "example": "Nachdem sie stundenlang geübt hatte, wusste sie genau, wie sie die Aufgabe lösen musste.", "is_phrase": false, "pos": "Verb"}, "wünsche": {"def": "Wenn man sich etwas wünscht, möchte man, dass etwas Bestimmtes passiert oder dass jemand etwas Gutes bekommt. Hier bedeutet es: Die Person hofft, dass ihrer Mutter etwas Gutes passiert.", "example": "Ich wünsche meiner Schwester viel Glück bei der Prüfung.", "is_phrase": false, "pos": "Verb"}, "würde": {"def": "'Würde' wird hier zusammen mit einem anderen Verb benutzt, um auszudrücken, was in der Vergangenheit als zukünftig erwartet oder befürchtet wurde. Man beschreibt so etwas, das aus der Sicht eines vergangenen Moments noch nicht passiert war, aber passieren sollte.", "example": "Sie machte sich Sorgen, dass sie die Prüfung nicht bestehen würde.", "is_phrase": false, "pos": "Verb (Konjunktiv II / indirekte Zukunft)"}, "würfen": {"def": "Ein Wurf ist die Bewegung, bei der man etwas mit dem Arm schleudert, zum Beispiel einen Ball oder einen Stein. 'Nach ein paar Würfen' bedeutet: nachdem die Person ein paar Mal etwas geworfen hatte.", "example": "Nach ein paar Würfen mit dem Ball begann das Kind, Spaß am Spiel zu finden.", "is_phrase": false, "pos": "Substantiv (Plural)"}, "zehnten": {"def": "Die Zehnte (Klasse) ist die zehnte Klassenstufe in der Schule. Wenn jemand 'in der Zehnten' ist, bedeutet das, dass er oder sie die zehnte Klasse besucht.", "example": "Meine Schwester ist erst in der Zehnten und schon besser in Mathe als ich.", "is_phrase": false, "pos": "Substantiv"}, "zeiten": {"def": "„Goldene Zeiten\" bedeutet eine Phase im Leben, in der es einem sehr gut geht und man glücklich und erfolgreich ist. Es ist eine besondere, schöne Zeit, an die man sich gern erinnert oder die man sich wünscht.", "example": "Als die Kinder noch klein waren, waren das für unsere Familie goldene Zeiten.", "is_phrase": true, "pos": "Redewendung"}, "ziemlich": {"def": "Man benutzt 'ziemlich', um zu sagen, dass etwas in hohem Maß zutrifft, aber nicht vollständig oder perfekt. Es bedeutet mehr als 'ein bisschen', aber weniger als 'sehr'.", "example": "Das Buch war ziemlich interessant, ich habe es fast in einem Tag gelesen.", "is_phrase": false, "pos": "Adverb"}, "zimmer": {"def": "Ein Zimmer ist ein abgeschlossener Raum in einer Wohnung oder einem Gebäude, in dem man lebt, schläft oder arbeitet. Hier meint es den persönlichen Raum des Bruders, zuerst zu Hause und dann im Studentenwohnheim.", "example": "In ihrem Zimmer hat sie viele Bücher und Fotos an der Wand hängen.", "is_phrase": false, "pos": "Substantiv"}, "zumindest": {"def": "Man benutzt 'zumindest', wenn man sagt, dass etwas nicht sicher oder vollständig stimmt, aber wenigstens ein Teil davon wahr ist. Es bedeutet so viel wie 'wenigstens' oder 'mindestens'.", "example": "Er hat nicht viel geholfen, aber zumindest war er freundlich.", "is_phrase": false, "pos": "Adverb"}, "zurück": {"def": "Wenn ein Team in einem Wettkampf zurückliegt, hat es weniger Punkte als das andere Team. Es bedeutet, dass man im Nachteil ist und noch aufholen muss.", "example": "Nach der ersten Halbzeit lag unsere Mannschaft zwei Tore zurück und musste hart kämpfen.", "is_phrase": false, "pos": "Adverb"}, "zwei": {"def": "Die Zahl 2, also eine Menge von zwei Einheiten. Hier gibt es an, wie viele Jahre lang etwas passiert ist.", "example": "Sie hat zwei Jahre lang in Berlin gewohnt, bevor sie nach München gezogen ist.", "is_phrase": false, "pos": "Zahlwort"}, "ärzte": {"def": "Ärzte sind Menschen, die Medizin studiert haben und Menschen bei Krankheiten oder gesundheitlichen Problemen helfen. Sie untersuchen Patienten und geben Ratschläge oder Empfehlungen.", "example": "Die Ärzte sagten meiner Mutter, dass ich mehr schlafen und weniger Stress haben sollte.", "is_phrase": false, "pos": "Substantiv (Plural)"}, "über": {"def": "Man benutzt 'über' hier, um ein Thema zu nennen, von dem jemand spricht oder redet. Es zeigt, womit sich ein Gespräch beschäftigt.", "example": "Die Freundinnen reden stundenlang über ihre Zukunftspläne.", "is_phrase": false, "pos": "Präposition"}, "überhaupt": {"def": "Das Wort 'überhaupt' verstärkt hier eine Aussage und bedeutet so viel wie 'wirklich' oder 'in jeder Hinsicht'. Es zeigt, dass etwas besonders wichtig oder bemerkenswert ist.", "example": "Das Konzert gestern war überhaupt ein tolles Erlebnis – die Musik war fantastisch und die Stimmung war super.", "is_phrase": false, "pos": "Adverb"}};

function render() {
  const tb = document.getElementById('tb');
  const raw = "KONTEXT_START\nCharlie ist sechzehn, er ist in seinem ersten Jahr in der Highschool und hat die Probleme, die man in diesem Alter so hat: mit M\u00e4dchen, mit der Schule, mit sich selbst. Zumindest scheint es so zu sein. Doch in den Briefen, die er an einen unbekannten \u00bbFreund\u00ab schreibt, wird deutlich, dass Charlie eine ganz besondere Sicht auf die Welt hat: Er beobachtet die Menschen um sich herum, fragt sich, ob sie ihr Leben so leben, wie sie es m\u00f6chten, und versucht verzweifelt, seine eigene Rolle in all dem, was wir Leben nennen, zu begreifen.\nKONTEXT_ENDE\n\nLieber Freund, langsam wird es hier kalt und frostig. Das sch\u00f6ne Herbstwetter ist mehr oder weniger vor\u00fcber. Die gute Nachricht ist, dass bald die Feiertage kommen, worauf ich mich jetzt schon freue, weil mein Bruder da nach Hause kommt. Vielleicht sogar rechtzeitig zu Thanksgiving! Jedenfalls w\u00fcnsche ich das meiner Mutter. Mein Bruder hat jetzt schon einige Wochen nicht mehr angerufen, und Mom redet nur noch \u00fcber seine Noten und Schlafgewohnheiten und das Essen, das er isst, und mein Vater sagt immer nur: \u201eEs wird ihm schon nichts passieren.\u201c Ich f\u00fcr meinen Teil stelle mir gern vor, wie mein Bruder Collegeerfahrungen sammelt, so wie in den Filmen. Aber nicht die mit den wilden Verbindungspartys, sondern die, in denen der Junge ein kluges M\u00e4dchen kennenlernt, das Pullis tr\u00e4gt und gern Kakao trinkt. Sie reden \u00fcber B\u00fccher und Probleme und k\u00fcssen sich im Regen. Ich denke, so etwas t\u00e4te ihm wirklich gut, vor allem wenn das M\u00e4dchen auf ihre ganz eigene Art und Weise sch\u00f6n ist. Solche M\u00e4dchen gefallen mir am besten \u2013 \u201eSupermodels\u201c und so etwas finde ich eher seltsam, warum auch immer. Andererseits h\u00e4ngen im Zimmer meines Bruders jede Menge Poster von \u201eSupermodels\u201c und von Autos und von Bierdosen und solchen Dingen, und wenn man sich dazu noch einen schmutzigen Boden vorstellt, wei\u00df man vermutlich, wie sein Zimmer im Wohnheim aussieht. Mein Bruder hat es immer gehasst, sein Bett zu machen, aber in seinem Kleiderschrank hat er immer sorgf\u00e4ltig Ordnung gehalten. Werde da einer schlau daraus. Wenn mein Bruder mal anruft, erz\u00e4hlt er eigentlich nie sonderlich viel. Er redet ein bisschen \u00fcber seine Kurse, vor allem aber \u00fcber das Footballteam. Das Team ist \u00fcberhaupt eine gro\u00dfe Sache, weil sie ziemlich gut sind und ein paar wirkliche Talente haben. Mein Bruder sagt, dass ein bestimmter Spieler eines Tages wohl Million\u00e4r sein wird, obwohl er \u201edumm wie Brot\u201c ist. Das ist schon ziemlich dumm, nehme ich mal an. Mein Bruder hat mir erz\u00e4hlt, wie einmal alle Spieler in der Umkleidekabine sa\u00dfen und dar\u00fcber redeten, was sie alles hatten machen m\u00fcssen, um ins Collegeteam zu kommen. Und irgendwann kamen sie auf die Ergebnisse ihrer Einstufungstests (so einen habe ich bisher nie machen m\u00fcssen). Und dieser eine Spieler sagte: \u201eIch hatte 710 Punkte.\u201c Und mein Bruder fragte: \u201eIn Mathe oder Sprachen?\u201c Und der Spieler sagte: \u201eH\u00e4h?\u201c Und das ganze Team lachte. Ich wollte immer in so einem Team sein. Ich wei\u00df nicht genau, wieso, aber irgendwie muss es toll sein, \u201egoldene Zeiten\u201c zu durchleben. Dann h\u00e4tte ich Geschichten, die ich meinen Enkelkindern und Golffreunden erz\u00e4hlen k\u00f6nnte. Nun, ich k\u00f6nnte ihnen von Punk Rocky und vom Heimlaufen nach der Schule und so erz\u00e4hlen. Vielleicht sind das ja meine goldenen Zeiten, und ich bemerke es gar nicht, weil kein Ball darin vorkommt. Als ich j\u00fcnger war, habe ich jede Menge Sport gemacht, und ich war sogar ziemlich gut, doch das Problem war, dass es mich zu aggressiv\u201c machte, deshalb sagten die \u00c4rzte Mom, ich m\u00fcsse damit aufh\u00f6ren. Mein Vater hatte einmal goldene Zeiten. Ich habe Fotos von ihm gesehen, als er noch jung war. Er sah damals wirklich gut aus. Das ist oft so bei alten Fotos \u2013 Menschen auf alten Fotos haben immer so markante Gesichter und wirken viel gl\u00fccklicher als man selbst. Meine Mutter sieht auf alten Fotos wundersch\u00f6n aus. Sch\u00f6ner als irgendwer sonst, au\u00dfer vielleicht Sam. Manchmal sehe ich meine Eltern an und frage mich, was geschehen ist, dass sie zu den Menschen wurden, die sie heute sind. Und dann frage ich mich, was mit meiner Schwester geschehen wird, wenn ihr Freund erst mal Anwalt ist. Und wie das Gesicht meines Bruders auf einer Football-Sammelkarte aussehen wird \u2013 oder wie es aussehen wird, wenn es nie auf einer Football-Sammelkarte auftaucht. Dad hat auf dem College zwei Jahre lang Baseball gespielt, aber er musste damit aufh\u00f6ren, als Mom mit meinem Bruder schwanger wurde. Da begann er dann, in einem B\u00fcro zu arbeiten. Um ehrlich zu sein, ich habe keine Ahnung, was mein Vater macht. Manchmal erz\u00e4hlt er eine Geschichte von fr\u00fcher. Eine wirklich tolle Geschichte. Es war die Baseball-Landesmeisterschaft, als er noch auf der Highschool war. Das Ende des letzten Innings, und sie hatten einen Runner auf der ersten Base. Dads Team lag einen Run zur\u00fcck, und offenbar gab es die gro\u00dfe Sorge, dass er das Spiel vergeigen w\u00fcrde, weil er j\u00fcnger als die meisten anderen und erst in der Zehnten war. Er war also wirklich nerv\u00f6s. Und hatte sogar richtig Angst. Nach ein paar W\u00fcrfen jedoch, erz\u00e4hlte er uns, wurde er auf einmal ruhig. Und als der Pitcher ausholte und den n\u00e4chsten Ball warf, wusste er ganz genau, wo der Ball hingehen w\u00fcrde. Und er traf ihn fester als jeden anderen Ball, den er je in seinem Leben getroffen hatte. Und er schlug einen Homerun, und sein Team gewann die Meisterschaft. Das Beste an der Geschichte ist, dass es immer die gleiche ist. Dad ist keiner, der bei solchen Sachen irgendetwas dazuerfindet. Manchmal, wenn ich mir mit Patrick und Sam ein Footballspiel ansehe, denke ich an all das. Und ich denke \u00fcber den Jungen nach, der gerade den Touchdown gemacht hat. Das sind die goldenen Zeiten f\u00fcr ihn. Eines Tages wird dieser Moment eine Geschichte sein, weil alle, die Touchdowns machen und Homeruns schlagen, eines Tages V\u00e4ter sein werden. Und wenn seine Kinder sich dann das Foto ihres Vaters im Schuljahrbuch ansehen, werden sie denken, dass ihr Vater echt gut aussah und ein markantes Gesicht hatte und dass er auf dem Foto viel gl\u00fccklicher wirkt als sie selbst. Hoffentlich vergesse ich nicht, meinen Kindern einmal zu sagen, dass sie genauso gl\u00fccklich sind, wie ich auf den alten Fotos aussehe. Und hoffentlich werden sie mir das glauben. \n\nAlles Liebe, Charlie \n";
  const tokens = raw.trim().split(/([ \t\n\r]+|[.,!?;:\u201e\u201c\u00bb\u00ab\/\(\)\[\]\-\u2013\u2014]+)/u);
  let html = '';
  tokens.forEach(tok => {
    if (!tok) return;
    if (/^[ \t]+$/.test(tok)) { html += tok; return; }
    if (/^[\n\r]+$/.test(tok)) { html += '<br>'; return; }
    if (/^[.,!?;:\u201e\u201c\u00bb\u00ab\/\(\)\[\]\-\u2013\u2014]+$/.test(tok)) { html += tok; return; }
    const key = tok.replace(/[^a-zA-Z\u00e4\u00f6\u00fc\u00c4\u00d6\u00dc\u00df'-]/gu,'')
                   .toLowerCase().replace(/^[-']+|[-']+$/g,'');
    if (key && DICT[key]) {
      const cls = 'w' + (DICT[key].is_phrase ? ' phrase' : '');
      html += '<span class="' + cls + '" data-orig="' + tok + '" onclick="show(event,\'' + key + '\',this)">' + tok + '</span>';
    } else {
      html += tok;
    }
  });
  tb.innerHTML = html;
}

function show(e, k, el) {
  const d = DICT[k]; if (!d) return;

  // Aktives Wort hervorheben
  if (activeEl) activeEl.classList.remove('active');
  activeEl = el || e.currentTarget;
  activeEl.classList.add('active', 'seen');

  // Originalschreibweise aus data-orig holen
  const orig = activeEl.getAttribute('data-orig') || k;

  // Panel befüllen
  document.getElementById('pWord').textContent = orig;
  document.getElementById('pPos').textContent  = d.pos || '';
  document.getElementById('pDef').textContent  = d.def || '';

  const pEx = document.getElementById('pEx');
  if (d.example) {
    pEx.textContent = '\u201e' + d.example + '\u201c';
    pEx.style.display = 'block';
  } else {
    pEx.style.display = 'none';
  }

  const pBadge = document.getElementById('pBadge');
  pBadge.style.display = d.is_phrase ? 'inline-block' : 'none';

  document.getElementById('panelEmpty').style.display   = 'none';
  document.getElementById('panelContent').classList.add('visible');

  // Tracking
  counts[k] = (counts[k]||0)+1;
  log.push({w:k,t:new Date().toISOString(),n:counts[k]});
  pushToSoSci();
}

function pushToSoSci() {
  const payload = {...META,counts,total:log.length,unique:Object.keys(counts).length,log};
  window.parent.postMessage({type:'LOOKUP_DATA',payload},'*');
  try {
    const f = window.parent.document.getElementById('v_LOOKUPS');
    if (f) f.value = JSON.stringify(payload);
  } catch(ex) {}
}

document.addEventListener('DOMContentLoaded', render);
</script>
</body>
