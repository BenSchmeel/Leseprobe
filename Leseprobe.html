<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesehilfe</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Source+Sans+3:wght@300;400;500&display=swap');
  :root{
    --paper:#faf8f4;--ink:#1a1814;--ink-soft:#4a4540;
    --accent:#8b5e3c;--accent-light:#f0e6d8;
    --panel-bg:#2c2420;--panel-text:#f5f0e8;
    --border:#d4ccc0;--seen-color:#d4b896;
    --panel-width:260px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Source Sans 3',sans-serif;background:var(--paper);color:var(--ink)}

  /* ── Layout: Text links, Panel rechts ── */
  .layout{
    display:flex;
    align-items:flex-start;
    max-width:1060px;
    margin:0 auto;
    padding:24px 16px 60px;
    gap:20px;
  }
  .main{flex:1;min-width:0;}

  /* ── Erklärungsleiste rechts ── */
  .panel{
    width:var(--panel-width);
    flex-shrink:0;
    position:sticky;
    top:20px;
    background:var(--panel-bg);
    border-radius:8px;
    padding:18px 16px;
    color:var(--panel-text);
    font-size:.88rem;
    line-height:1.65;
    min-height:180px;
    box-shadow:0 4px 20px rgba(0,0,0,.2);
    transition:opacity .2s;
  }
  .panel-empty{
    opacity:.45;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-size:.82rem;
    color:#9e8a78;
    min-height:120px;
  }
  .panel-content{display:none;}
  .panel-content.visible{display:block;}
  .p-badge{
    display:inline-block;font-size:.7rem;background:#5a3e2b;color:#d4a96a;
    border-radius:3px;padding:1px 7px;margin-bottom:8px;letter-spacing:.04em;
  }
  .p-word{
    font-family:'Lora',serif;font-weight:600;font-size:1.05rem;
    color:#f0d9b8;display:block;margin-bottom:3px;
  }
  .p-pos{
    font-size:.72rem;color:#9e8a78;text-transform:uppercase;
    letter-spacing:.06em;display:block;margin-bottom:8px;
  }
  .p-def{color:#d4c9be;display:block;}
  .p-ex{
    margin-top:10px;font-style:italic;font-size:.82rem;color:#8a7a6e;
    border-top:1px solid rgba(255,255,255,.08);padding-top:9px;display:block;
  }

  /* ── Hinweis oben ── */
  .hint{
    font-size:.82rem;color:var(--ink-soft);margin-bottom:16px;
    padding:9px 14px;background:var(--accent-light);
    border-radius:4px;border-left:3px solid var(--accent);
  }

  /* ── Textbox ── */
  .text-box{
    background:white;border:1px solid var(--border);border-radius:4px;
    padding:32px 36px;line-height:2.05;font-family:'Lora',serif;
    font-size:1.05rem;box-shadow:0 2px 12px rgba(0,0,0,.04);
  }

  /* ── Anklickbare Wörter ── */
  .w{
    cursor:pointer;border-bottom:1px dotted var(--accent);
    border-radius:2px;padding:0 1px;transition:background .15s;display:inline;
  }
  .w:hover{background:var(--accent-light);}
  .w.seen{background:var(--accent-light);border-bottom-color:var(--seen-color);color:var(--accent);}
  .w.active{background:var(--accent);color:white;border-bottom-color:transparent;}
  .w.phrase{border-bottom:2px dashed #b07d50;}
  .w.phrase.seen{border-bottom-color:#c9956a;}
  .w.phrase.active{background:var(--accent);color:white;}

  /* ── Legende ── */
  .legend{
    margin-top:12px;display:flex;gap:16px;flex-wrap:wrap;
    font-size:.76rem;color:var(--ink-soft);
  }
  .leg-item{display:flex;align-items:center;gap:5px;}

  @media(max-width:700px){
    .layout{flex-direction:column;}
    .panel{width:100%;position:static;}
  }
</style>
</head>
<body>
<div class="layout">

  <!-- Linke Spalte: Text -->
  <div class="main">
    <div class="hint">
      Klicken Sie auf ein <u style="text-decoration-style:dotted">unterstrichenes Wort</u> – die Erklärung erscheint rechts.
      &nbsp;<span style="border-bottom:2px dashed #b07d50;padding:0 2px">Gestrichelt</span> = Redewendung.
    </div>
    <div class="text-box" id="tb"></div>
    <div class="legend">
      <span class="leg-item"><span style="border-bottom:1px dotted #8b5e3c;padding:0 3px">Wort</span>&nbsp;erklärtes Wort</span>
      <span class="leg-item"><span style="border-bottom:2px dashed #b07d50;padding:0 3px">Phrase</span>&nbsp;Redewendung</span>
      <span class="leg-item"><span style="background:#f0e6d8;border-radius:2px;padding:0 3px">farbig</span>&nbsp;bereits nachgeschlagen</span>
    </div>
  </div>

  <!-- Rechte Spalte: Erklärungsleiste -->
  <div class="panel" id="panel">
    <div class="panel-empty" id="panelEmpty">
      ← Klicken Sie auf ein unterstrichenes Wort
    </div>
    <div class="panel-content" id="panelContent">
      <span class="p-badge" id="pBadge" style="display:none">Redewendung</span>
      <span class="p-word" id="pWord"></span>
      <span class="p-pos"  id="pPos"></span>
      <span class="p-def"  id="pDef"></span>
      <span class="p-ex"   id="pEx" style="display:none"></span>
    </div>
  </div>

</div>
<script>
const DICT = {"aggressiv": {"def": "Wenn jemand aggressiv ist, verhält er sich sehr reizbar und kämpferisch. Er reagiert leicht mit Wut oder Gewalt auf andere Menschen.", "example": "Nach dem Streit mit seinem Bruder wurde er so aggressiv, dass er die Tür zuschlug und niemanden mehr ansprechen wollte.", "is_phrase": false, "pos": "Adjektiv"}, "ahnung": {"def": "'Keine Ahnung haben' bedeutet, dass man etwas nicht weiß oder nicht kennt. Man hat keine Information oder kein Wissen über etwas.", "example": "Ich habe keine Ahnung, wo ich meinen Schlüssel hingelegt habe.", "is_phrase": true, "pos": "Redewendung"}, "all": {"def": "Das Wort 'all' bedeutet hier: die gesamte Menge oder Summe von etwas, nichts wird ausgelassen. Es bezieht sich auf alles zusammen, was vorher erwähnt oder erlebt wurde.", "example": "Wenn ich alte Fotos anschaue, denke ich an all das, was wir zusammen erlebt haben.", "is_phrase": false, "pos": "Indefinitpronomen"}, "alten": {"def": "Etwas, das schon lange Zeit existiert oder aus der Vergangenheit kommt. Bei Fotos bedeutet es, dass die Bilder vor langer Zeit gemacht wurden.", "example": "In der Schachtel fand sie alte Fotos von ihrer Großmutter.", "is_phrase": false, "pos": "Adjektiv"}, "alter": {"def": "Das Alter ist die Anzahl der Jahre, die eine Person gelebt hat. Hier meint es eine bestimmte Lebensphase, nämlich die Zeit, in der man ungefähr sechzehn Jahre alt ist.", "example": "In diesem Alter machen sich viele Jugendliche Gedanken darüber, wer sie sind und was sie vom Leben wollen.", "is_phrase": false, "pos": "Substantiv"}, "andererseits": {"def": "Man benutzt 'andererseits', um eine zweite Seite oder einen weiteren Aspekt einer Situation zu zeigen. Es bedeutet: aber es gibt noch etwas anderes, das man auch bedenken muss.", "example": "Das Restaurant ist teuer. Andererseits ist das Essen dort wirklich sehr gut.", "is_phrase": false, "pos": "Adverb"}, "angerufen": {"def": "Jemanden anrufen bedeutet, eine andere Person telefonisch zu kontaktieren. Hier bedeutet es, dass der Bruder seit Wochen keinen Telefonanruf nach Hause gemacht hat.", "example": "Meine Freundin hat mich die ganze Woche nicht angerufen, deshalb mache ich mir ein bisschen Sorgen.", "is_phrase": false, "pos": "Verb"}, "angst": {"def": "Ein starkes, unangenehmes Gefühl, wenn man denkt, dass etwas Schlimmes passieren könnte. Die Person fühlt sich unsicher und will, dass die gefährliche oder bedrohliche Situation aufhört.", "example": "Als das Flugzeug stark zu wackeln begann, hatte sie richtig Angst.", "is_phrase": false, "pos": "Substantiv"}, "anruft": {"def": "Jemanden anrufen bedeutet, eine andere Person mit dem Telefon zu kontaktieren. Man wählt die Nummer und spricht dann mit der Person.", "example": "Meine Mutter ruft mich jeden Sonntag an, um zu hören, wie es mir geht.", "is_phrase": false, "pos": "Verb"}, "ansehe": {"def": "Etwas ansehen bedeutet, etwas zu schauen oder zu beobachten, zum Beispiel einen Film oder eine Sendung im Fernsehen. Man gibt dem, was man sieht, seine Aufmerksamkeit.", "example": "Wir sehen uns jeden Sonntag zusammen einen Film an.", "is_phrase": false, "pos": "Verb"}, "ansehen": {"def": "Etwas ansehen bedeutet, dass man etwas mit den Augen betrachtet und es aufmerksam schaut. Man richtet seinen Blick auf ein Bild, eine Person oder einen Gegenstand.", "example": "Die Kinder saßen zusammen und sahen sich die alten Fotos aus dem Urlaub an.", "is_phrase": false, "pos": "Verb"}, "anwalt": {"def": "Ein Anwalt ist eine Person, die Jura studiert hat und andere Menschen in rechtlichen Fragen berät oder vor Gericht vertritt. Hier bedeutet 'Anwalt sein', dass der Freund sein Studium abgeschlossen hat und diesen Beruf ausübt.", "example": "Sie hat viele Jahre studiert und ist jetzt endlich Anwältin.", "is_phrase": false, "pos": "Substantiv"}, "arbeiten": {"def": "Eine Tätigkeit regelmäßig ausführen, für die man Geld bekommt. Hier bedeutet es, dass jemand in einem Büro seinen Beruf ausübt.", "example": "Nach der Ausbildung begann sie, in einer Firma zu arbeiten.", "is_phrase": false, "pos": "Verb"}, "art": {"def": "Die Phrase 'auf seine/ihre eigene Art und Weise' bedeutet, dass jemand etwas so tut, wie es typisch für diese Person ist – also auf eine besondere, persönliche Art, die nur zu ihr gehört. Man betont damit, dass die Person sich von anderen unterscheidet.", "example": "Er kocht auf seine ganz eigene Art und Weise – immer ohne Rezept, aber das Ergebnis schmeckt wunderbar.", "is_phrase": true, "pos": "Redewendung"}, "aufhören": {"def": "Wenn man mit etwas aufhört, macht man eine Aktivität nicht mehr weiter. Man beendet etwas, das man vorher regelmäßig getan hat.", "example": "Er hat viele Jahre Klavier gespielt, aber als er krank wurde, musste er damit aufhören.", "is_phrase": true, "pos": "Verb (feste Verbindung: damit aufhören)"}, "auftaucht": {"def": "Wenn jemand oder etwas irgendwo auftaucht, bedeutet das, dass er oder es an einem bestimmten Ort zu sehen oder zu finden ist. Hier bedeutet es: dass das Gesicht des Bruders auf einer Football-Sammelkarte erscheint und abgebildet ist.", "example": "Sein Name taucht in keiner einzigen Zeitung auf – er ist völlig unbekannt.", "is_phrase": false, "pos": "Verb"}, "ausholte": {"def": "Ausholen bedeutet, den Arm weit nach hinten zu bewegen, bevor man wirft, schlägt oder schwingt. Es ist die Vorbereitung für eine starke Bewegung nach vorne.", "example": "Der Tennisspieler holte weit aus und schlug den Ball mit voller Kraft über das Netz.", "is_phrase": false, "pos": "Verb"}, "aussah": {"def": "Das ist die Vergangenheitsform von 'aussehen'. Es beschreibt, wie eine Person oder Sache von außen wirkte oder welchen äußeren Eindruck sie machte.", "example": "Als meine Oma jung war, sah sie sehr elegant aus.", "is_phrase": false, "pos": "Verb"}, "aussehe": {"def": "Aussehen bedeutet hier, wie jemand auf einem Foto wirkt oder erscheint – also welchen Eindruck man von außen macht. Auf den Fotos sieht die Person glücklich aus, das heißt, man kann ihr Glück im Gesicht sehen.", "example": "Auf dem Urlaubsfoto sieht meine Schwester sehr entspannt und zufrieden aus.", "is_phrase": false, "pos": "Verb"}, "aussehen": {"def": "Wenn etwas oder jemand 'aussieht', beschreibt man, welchen äußeren Eindruck oder welches Bild man von dieser Person oder Sache hat. Hier geht es darum, wie das Gesicht des Bruders auf einem Foto oder einer Karte zu sehen sein wird.", "example": "Ich frage mich, wie ich auf dem Klassenfoto aussehen werde.", "is_phrase": false, "pos": "Verb"}, "aussieht": {"def": "Das Verb 'aussehen' beschreibt, welchen visuellen Eindruck etwas oder jemand macht. Hier geht es darum, wie das Zimmer des Bruders wirkt, wenn man es sieht.", "example": "Nach der Party sieht die Küche wirklich schlimm aus – überall stehen leere Gläser und Teller.", "is_phrase": false, "pos": "Verb"}, "autos": {"def": "Autos sind Fahrzeuge mit einem Motor, mit denen man auf der Straße fahren kann. Viele junge Männer interessieren sich sehr für Autos und hängen Bilder davon an die Wand.", "example": "An der Wand seines Zimmers hängen Poster von schnellen Autos und Motorrädern.", "is_phrase": false, "pos": "Substantiv (Plural)"}, "außer": {"def": "Das Wort 'außer' bedeutet hier: eine Person oder Sache wird von einer Aussage ausgenommen. Man sagt damit, dass etwas für alle gilt, aber nicht für diese eine Person.", "example": "Sie war die Schnellste in der Klasse, außer vielleicht ihrer Freundin Lena.", "is_phrase": false, "pos": "Präposition"}, "bald": {"def": "Das Wort 'bald' bedeutet, dass etwas in kurzer Zeit passieren wird. Es beschreibt eine Zukunft, die nicht weit entfernt ist.", "example": "Ich freue mich, weil bald der Sommer beginnt und wir in den Urlaub fahren.", "is_phrase": false, "pos": "Adverb"}, "ball": {"def": "Ein runder Gegenstand, der beim Sport verwendet wird, zum Beispiel beim Baseball oder Fußball. Man kann ihn werfen, schlagen oder treten.", "example": "Der Spieler schlug den Ball so stark, dass er weit über das Feld flog.", "is_phrase": false, "pos": "Substantiv"}, "base": {"def": "Eine Base ist beim Baseball ein bestimmter Punkt auf dem Spielfeld, den die laufenden Spieler erreichen und berühren müssen. Es gibt vier solcher Punkte, und ein Spieler, der auf einer Base steht, ist sicher vor dem gegnerischen Team.", "example": "Der Spieler rannte so schnell er konnte und erreichte die zweite Base, bevor der Ball ankam.", "is_phrase": false, "pos": "Substantiv"}, "baseball": {"def": "Baseball ist eine Mannschaftssportart, die vor allem in den USA sehr beliebt ist. Zwei Teams spielen gegeneinander, wobei ein Spieler einen Ball mit einem Schläger trifft und dann versucht, bestimmte Punkte auf dem Spielfeld zu erreichen.", "example": "Als Kind hat er oft Baseball gespielt und davon geträumt, eines Tages Profi zu werden.", "is_phrase": false, "pos": "Substantiv"}, "baseball-landesmeisterschaft": {"def": "Ein Wettkampf, bei dem die beste Baseballmannschaft eines Bundeslandes gesucht wird. Der Sieger dieser Meisterschaft ist die stärkste Mannschaft in diesem Bundesland.", "example": "Unsere Schulmannschaft hat die Baseball-Landesmeisterschaft gewonnen und darf jetzt bei der nationalen Meisterschaft mitspielen.", "is_phrase": false, "pos": "Substantiv"}, "begann": {"def": "Das ist die Vergangenheitsform von 'beginnen'. Es bedeutet, dass etwas zu einem bestimmten Zeitpunkt in der Vergangenheit angefangen hat.", "example": "Als sie zwanzig Jahre alt war, begann sie, Musik zu studieren.", "is_phrase": false, "pos": "Verb"}, "begreifen": {"def": "Etwas begreifen bedeutet hier, etwas wirklich verstehen und einen Sinn darin finden. Charlie versucht zu verstehen, welche Bedeutung sein Leben hat und welche Rolle er dabei spielt.", "example": "Als Kind konnte ich nicht begreifen, warum manche Menschen so unglücklich sind, obwohl sie alles haben.", "is_phrase": false, "pos": "Verb"}, "bemerke": {"def": "Etwas bemerken bedeutet, dass man etwas wahrnimmt oder erkennt, obwohl es vielleicht nicht sofort offensichtlich ist. Hier bedeutet es, dass die Person nicht erkennt, dass diese Zeit in ihrem Leben etwas Besonderes und Wertvolles ist.", "example": "Er war so beschäftigt mit der Arbeit, dass er gar nicht bemerkte, wie schön der Tag war.", "is_phrase": false, "pos": "Verb"}, "beobachtet": {"def": "Jemanden beobachten bedeutet, dass man andere Menschen genau anschaut und auf ihr Verhalten achtet. Man versucht zu verstehen, wie sie sind und was sie tun.", "example": "Sie sitzt oft im Café und beobachtet die Menschen, die vorbeigehen.", "is_phrase": false, "pos": "Verb"}, "besondere": {"def": "Hier bedeutet 'besondere', dass etwas sich deutlich von anderen Dingen oder Menschen unterscheidet und nicht gewöhnlich ist. Charlies Sicht auf die Welt ist also anders und ungewöhnlich im Vergleich zu dem, wie die meisten Menschen die Welt sehen.", "example": "Das Mädchen hat eine ganz besondere Art, Probleme zu lösen – sie denkt immer anders als alle anderen.", "is_phrase": false, "pos": "Adjektiv"}, "beste": {"def": "Das Beste bezeichnet den Teil oder die Eigenschaft einer Sache, die am wertvollsten oder schönsten ist. Man verwendet es, um das Positivste an etwas hervorzuheben.", "example": "Das Beste an meinem Job ist, dass ich viel Zeit draußen verbringen kann.", "is_phrase": false, "pos": "Substantiv"}, "besten": {"def": "'Am besten gefallen' bedeutet, dass man etwas oder jemanden mehr mag als alle anderen. Es drückt aus, was man am liebsten hat oder was einem am meisten zusagt.", "example": "Von allen Musikstilen gefällt mir Jazz am besten.", "is_phrase": true, "pos": "Adverb"}, "bestimmter": {"def": "Man benutzt 'ein bestimmter' (eine bestimmte, ein bestimmtes), wenn man von einer konkreten Person oder Sache spricht, die man kennt oder im Kopf hat, aber deren Namen man nicht nennt oder nennen will.", "example": "Eine bestimmte Schülerin in meiner Klasse hat immer die besten Noten, aber ich sage nicht, wer es ist.", "is_phrase": false, "pos": "Adjektiv"}, "bett": {"def": "Das Bett machen bedeutet, die Decke und das Kissen nach dem Schlafen ordentlich hinzulegen, sodass das Bett sauber und aufgeräumt aussieht. Es ist eine alltägliche Aufgabe am Morgen.", "example": "Bevor sie zur Schule geht, macht sie jeden Morgen ihr Bett.", "is_phrase": true, "pos": "Redewendung"}, "bierdosen": {"def": "Eine Bierdose ist ein kleiner Behälter aus Metall, in dem Bier verkauft wird. Im Text hängen Poster von Bierdosen an der Wand, was zeigt, dass der Bruder typische Dinge mag, die oft mit jungen Männern verbunden werden.", "example": "An seiner Zimmerwand hingen Poster von Bierdosen und Sportwagen.", "is_phrase": false, "pos": "Substantiv (Plural)"}, "bisher": {"def": "Bisher bedeutet: bis zu diesem Moment, bis jetzt. Es beschreibt, dass etwas in der ganzen Zeit vor dem jetzigen Moment nicht passiert ist oder nicht existiert hat.", "example": "Ich habe bisher noch nie in einem anderen Land gewohnt.", "is_phrase": false, "pos": "Adverb"}, "bisschen": {"def": "Ein bisschen bedeutet, dass etwas in kleiner Menge oder in geringem Maß geschieht. Hier spricht er nur kurz und nicht viel über seine Kurse.", "example": "Sie hat ein bisschen über ihr Wochenende erzählt, dann haben wir über etwas anderes geredet.", "is_phrase": false, "pos": "Adverb"}, "boden": {"def": "Der Boden ist die untere, flache Fläche in einem Zimmer oder Raum, auf der man läuft. Hier meint es den Fußboden, der nicht sauber ist und zum unordentlichen Eindruck des Zimmers beiträgt.", "example": "Nach der Party war der Boden in der Küche voller Krümel und Flecken.", "is_phrase": false, "pos": "Substantiv"}, "briefen": {"def": "Ein Brief ist eine schriftliche Nachricht, die man auf Papier schreibt und an eine andere Person schickt oder richtet. In diesem Text schreibt Charlie regelmäßig Briefe an eine unbekannte Person, um ihr von seinem Leben und seinen Gedanken zu erzählen.", "example": "Sie schrieb ihrer Großmutter einen langen Brief, weil sie ihr viele Dinge mitteilen wollte.", "is_phrase": false, "pos": "Substantiv"}, "brot": {"def": "Die Phrase 'dumm wie Brot' bedeutet, dass eine Person sehr unintelligent oder wenig klug ist. Man benutzt diese Aussage, um auf humorvolle oder abwertende Weise zu sagen, dass jemand kaum nachdenkt oder wenig versteht.", "example": "Der neue Kollege macht ständig die gleichen Fehler – der ist wirklich dumm wie Brot.", "is_phrase": true, "pos": "Redewendung"}, "bruder": {"def": "Ein Bruder ist ein Mann oder Junge, der dieselben Eltern hat wie eine andere Person. Er ist also ein direktes männliches Familienmitglied.", "example": "Mein Bruder ist drei Jahre älter als ich und wohnt jetzt in einer anderen Stadt.", "is_phrase": false, "pos": "Substantiv"}, "bruders": {"def": "Ein Bruder ist ein männliches Familienmitglied, das dieselben Eltern hat wie man selbst. Hier spricht jemand über seinen eigenen Bruder und beschreibt, wie er lebt und aussieht.", "example": "Das Zimmer meines Bruders ist immer unordentlich, aber er findet trotzdem alles.", "is_phrase": false, "pos": "Substantiv"}, "bücher": {"def": "Ein Buch ist ein gedrucktes Werk mit vielen Seiten, das Texte, Geschichten oder Informationen enthält. Hier spricht die Person über Bücher als Gesprächsthema, also über Texte oder Geschichten, die sie gelesen hat.", "example": "Die beiden Freunde sitzen im Café und reden stundenlang über Bücher, die sie zuletzt gelesen haben.", "is_phrase": false, "pos": "Substantiv"}, "büro": {"def": "Ein Büro ist ein Raum oder ein Gebäude, in dem Menschen an einem Schreibtisch arbeiten, zum Beispiel mit Papieren oder am Computer. Viele Angestellte in Firmen oder Behörden arbeiten in einem Büro.", "example": "Sie fährt jeden Morgen mit der Bahn ins Büro.", "is_phrase": false, "pos": "Substantiv"}, "charlie": {"def": "Charlie ist hier ein Vorname, mit dem sich die Person am Ende eines Briefes oder einer Nachricht vorstellt. Es ist der Name des Absenders, also der Person, die den Brief geschrieben hat.", "example": "Sie faltete den Brief zusammen und lächelte, als sie am Ende las: Alles Liebe, Charlie.", "is_phrase": false, "pos": "Eigenname"}, "college": {"def": "Eine höhere Schule oder Hochschule, die man nach der normalen Schule besucht, um einen Beruf zu lernen oder einen Abschluss zu machen. Das Wort kommt aus dem Englischen und wird oft für amerikanische oder britische Bildungseinrichtungen verwendet.", "example": "Nach der Schule ging sie auf ein College in den USA, um Medizin zu studieren.", "is_phrase": false, "pos": "Substantiv"}, "collegeerfahrungen": {"def": "Erlebnisse und Erfahrungen, die junge Menschen typischerweise an einer Hochschule machen, zum Beispiel Partys, neue Freundschaften und das erste selbstständige Leben – so wie man es oft in Filmen sieht. Das Wort beschreibt ein romantisches, idealisiertes Bild vom Studentenleben.", "example": "Sie träumte davon, endlich Collegeerfahrungen zu sammeln: neue Menschen kennenlernen, feiern gehen und frei sein.", "is_phrase": false, "pos": "Substantiv"}, "collegeteam": {"def": "Eine Sportmannschaft, die zu einer Hochschule oder einem College gehört und dort offiziell für Wettkämpfe antritt. Nur die besten Sportlerinnen und Sportler der Schule dürfen in diesem Team mitspielen.", "example": "Er trainierte jeden Tag hart, weil er unbedingt ins Collegeteam aufgenommen werden wollte.", "is_phrase": false, "pos": "Substantiv"}, "dad": {"def": "Ein informelles, freundliches Wort für den Vater. Es wird so verwendet, als wäre es ein Name, deshalb steht kein Artikel davor.", "example": "Dad hat heute Abend gekocht, weil Mom arbeiten musste.", "is_phrase": false, "pos": "Substantiv"}, "dads": {"def": "Das Wort ist die englische Bezeichnung für 'Vater' und wird hier als Genitiv benutzt, also 'Dads Team' bedeutet 'das Team des Vaters'. Es handelt sich um ein Lehnwort aus dem Englischen, das im Deutschen umgangssprachlich verwendet wird.", "example": "Dads Auto stand den ganzen Tag in der Einfahrt.", "is_phrase": false, "pos": "Substantiv (Genitiv)"}, "damals": {"def": "Das Wort 'damals' bedeutet: zu einer bestimmten Zeit in der Vergangenheit. Man spricht über etwas, das früher so war, aber heute vielleicht anders ist.", "example": "Damals hatten wir noch kein Internet, das Leben war ganz anders.", "is_phrase": false, "pos": "Adverb"}, "daraus": {"def": "Die Phrase 'schlau werden aus etwas' bedeutet, etwas zu verstehen oder einen Sinn in etwas zu finden. Hier wird sie verneint verwendet: Man kann es nicht verstehen, weil es zu kompliziert oder verwirrend ist.", "example": "Die Bedienungsanleitung ist so kompliziert – werde da einer schlau daraus!", "is_phrase": true, "pos": "Redewendung"}, "darin": {"def": "Das Wort 'darin' bedeutet hier 'in dieser Zeit' oder 'in diesen Zeiten'. Es zeigt, dass etwas in dem zuvor genannten Zeitraum oder in der genannten Situation fehlt oder vorhanden ist.", "example": "Das war ein schöner Urlaub, aber kein einziger sonniger Tag kam darin vor.", "is_phrase": false, "pos": "Adverb"}, "darüber": {"def": "Das Wort 'darüber' zeigt hier, worüber die Spieler sprechen. Es ersetzt einen Ausdruck wie 'über dieses Thema' oder 'über diese Sache'.", "example": "Die Kinder haben darüber geredet, was sie in den Ferien erlebt haben.", "is_phrase": false, "pos": "Adverb"}, "dazuerfindet": {"def": "Etwas dazuerfinden bedeutet, zu einer Geschichte oder Situation extra Dinge hinzuzufügen, die nicht wahr sind. Man erfindet also Details, die es so nicht gegeben hat.", "example": "Sie erzählte den Unfall genau so, wie er passiert war – sie erfand nichts dazu.", "is_phrase": false, "pos": "Verb"}, "denke": {"def": "Das Verb 'denken' bedeutet, dass man etwas im Kopf überlegt oder eine Meinung über etwas hat. In Beleg 3 steht 'nachdenken', was bedeutet, dass man sich intensiv mit einem Thema beschäftigt.", "example": "Ich denke, der Film war sehr interessant.", "is_phrase": false, "pos": "Verb"}, "denken": {"def": "Eine Meinung oder Vorstellung im Kopf haben, wenn man etwas sieht oder erlebt. Hier meint es, dass die Kinder beim Anschauen des Fotos eine bestimmte Idee oder einen Gedanken bekommen werden.", "example": "Wenn sie das alte Foto sieht, wird sie denken, dass ihre Mutter damals sehr jung aussah.", "is_phrase": false, "pos": "Verb"}, "deutlich": {"def": "Wenn etwas 'deutlich wird', bedeutet das, dass man etwas gut erkennen oder verstehen kann, weil es klar sichtbar oder spürbar ist. Es war vorher vielleicht nicht so einfach zu sehen, aber jetzt kann man es klar erkennen.", "example": "Wenn man sein Tagebuch liest, wird deutlich, wie einsam er sich gefühlt hat.", "is_phrase": false, "pos": "Adjektiv / Adverb"}, "dingen": {"def": "Das Wort 'Dinge' bedeutet hier Gegenstände oder Sachen im allgemeinen Sinne. Es wird verwendet, um eine Gruppe von ähnlichen Objekten zusammenzufassen, die vorher genannt wurden.", "example": "An der Wand hingen Bilder, Kalender und solche Dinge, die man oft in Jugendzimmern sieht.", "is_phrase": false, "pos": "Substantiv"}, "dumm": {"def": "\"Dumm wie Brot\" bedeutet, dass jemand sehr wenig intelligent ist oder sehr schlechte Leistungen im Denken zeigt. Das Brot steht hier als Vergleich für etwas, das keinen Verstand hat.", "example": "Er macht immer wieder dieselben Fehler – der ist wirklich dumm wie Brot.", "is_phrase": true, "pos": "Redewendung"}, "durchleben": {"def": "Etwas durchleben bedeutet, eine bestimmte Zeit oder Situation selbst zu erleben und wirklich dabei zu sein. Man erlebt diese Zeit am eigenen Körper und ist mittendrin.", "example": "Meine Großeltern haben die Nachkriegszeit persönlich durchlebt und erzählen oft davon.", "is_phrase": false, "pos": "Verb"}, "echt": {"def": "Hier bedeutet 'echt' so viel wie 'wirklich' oder 'sehr'. Es verstärkt das folgende Adjektiv und zeigt, dass etwas in hohem Maß zutrifft.", "example": "Der Film war echt spannend – ich konnte nicht aufhören, ihn zu schauen.", "is_phrase": false, "pos": "Adverb"}, "eher": {"def": "Das Wort 'eher' drückt hier aus, dass etwas ein bisschen oder leicht so ist, aber nicht ganz stark. Es zeigt eine vorsichtige oder abgeschwächte Meinung.", "example": "Diesen Film finde ich eher langweilig – er ist nicht schlecht, aber auch nicht spannend.", "is_phrase": false, "pos": "Adverb"}, "ehrlich": {"def": "'Um ehrlich zu sein' sagt man, wenn man etwas sagen möchte, das vielleicht unangenehm oder überraschend ist, aber der Wahrheit entspricht. Man benutzt diese Phrase am Anfang eines Satzes, um zu zeigen, dass man jetzt offen und direkt spricht.", "example": "Um ehrlich zu sein, ich finde diesen Film ziemlich langweilig.", "is_phrase": true, "pos": "Redewendung"}, "eigene": {"def": "Die Phrase 'auf seine/ihre ganz eigene Art und Weise' bedeutet, dass jemand etwas auf eine besondere, persönliche Art tut, die typisch für diese Person ist und sich von anderen unterscheidet. Es drückt aus, dass diese Art einzigartig und individuell ist.", "example": "Er macht Witze auf seine ganz eigene Art und Weise – man muss ihn einfach mögen.", "is_phrase": true, "pos": "Redewendung"}, "eigentlich": {"def": "Das Wort bedeutet hier 'meistens' oder 'in den meisten Fällen'. Es beschreibt, was normalerweise passiert oder wie etwas in der Regel ist.", "example": "Wenn wir uns treffen, redet sie eigentlich immer über ihre Arbeit.", "is_phrase": false, "pos": "Adverb"}, "einige": {"def": "Das Wort 'einige' bedeutet hier 'mehrere' oder 'eine nicht genaue, aber nicht kleine Anzahl von etwas'. Es zeigt, dass es sich um mehr als nur zwei oder drei handelt, aber die genaue Zahl ist nicht wichtig.", "example": "Wir haben einige Wochen auf die Antwort gewartet, aber sie kam nie.", "is_phrase": false, "pos": "Indefinitpronomen / Artikel"}, "einmal": {"def": "Das Wort 'einmal' hat in diesen Belegen drei verschiedene Bedeutungen. In Beleg 1 und 2 bedeutet es, dass etwas in der Vergangenheit passiert ist oder war (früher, zu einem bestimmten Zeitpunkt). In Beleg 3 ist 'auf einmal' eine feste Phrase und bedeutet plötzlich, ohne Vorwarnung.", "example": "Als Kind hatte er einmal einen Hund, den er sehr liebte. – Nach vielen Stunden des Wartens war er auf einmal sehr müde.", "is_phrase": false, "pos": "Adverb"}, "einstufungstests": {"def": "Ein Einstufungstest ist ein Test, den man macht, um herauszufinden, welches Niveau oder welche Klasse für eine Person am besten geeignet ist. Zum Beispiel machen Sprachschüler oft einen solchen Test, bevor sie mit einem Kurs beginnen.", "example": "Bevor sie den Sprachkurs beginnen konnte, musste sie einen Einstufungstest machen, damit die Schule wusste, in welche Gruppe sie gehört.", "is_phrase": false, "pos": "Substantiv"}, "eltern": {"def": "Die Eltern sind die Mutter und der Vater eines Menschen. Im Text denkt die Person über ihre Eltern nach und fragt sich, wie sie zu den Menschen geworden sind, die sie heute sind.", "example": "Meine Eltern sind sehr verschieden: Mein Vater ist ruhig, aber meine Mutter redet viel.", "is_phrase": false, "pos": "Substantiv (Plural)"}, "ende": {"def": "Der Punkt, an dem etwas aufhört oder abgeschlossen ist. Hier bezeichnet es den letzten Abschnitt eines Spiels, der kurz davor ist, fertig zu sein.", "example": "Beim Ende des Spiels stand es noch unentschieden.", "is_phrase": false, "pos": "Substantiv"}, "enkelkindern": {"def": "Die Kinder der eigenen Kinder. Man ist der Großvater oder die Großmutter dieser Personen.", "example": "Meine Tochter hat zwei Kinder bekommen, und ich bin sehr glücklich, jetzt Enkelkinder zu haben.", "is_phrase": false, "pos": "Substantiv (Plural)"}, "ergebnisse": {"def": "Ein Ergebnis ist das, was am Ende einer Prüfung oder eines Tests herauskommt. Es zeigt, wie gut oder schlecht jemand bei einer Aufgabe war.", "example": "Nach dem Test hat die Lehrerin die Ergebnisse mit den Schülern besprochen.", "is_phrase": false, "pos": "Substantiv"}, "erst": {"def": "Das Wort 'erst' bedeutet hier, dass etwas noch nicht lange so ist oder dass eine Zahl kleiner oder geringer ist als man vielleicht erwartet. Es zeigt, dass etwas noch am Anfang oder auf einem niedrigen Stand ist.", "example": "Sie ist erst zwölf Jahre alt, aber sie spielt schon sehr gut Klavier.", "is_phrase": false, "pos": "Adverb"}, "ersten": {"def": "Beim Baseball ist die 'erste Base' einer von vier festen Punkten auf dem Spielfeld, die ein Spieler der angreifenden Mannschaft nacheinander erreichen muss. Es ist der erste Punkt, den ein Spieler nach dem Schlag anlaufen muss.", "example": "Der Schläger traf den Ball und lief schnell zur ersten Base, bevor der Gegner den Ball fangen konnte.", "is_phrase": false, "pos": "Adjektiv"}, "erzählen": {"def": "Jemandem mündlich von etwas berichten, was man erlebt hat oder was passiert ist. Man gibt Informationen oder Geschichten an andere Personen weiter.", "example": "Der alte Mann erzählt seinen Enkeln jeden Abend eine Geschichte aus seiner Kindheit.", "is_phrase": false, "pos": "Verb"}, "erzählt": {"def": "Jemandem von etwas berichten oder eine Geschichte sagen, damit die andere Person etwas erfährt. Man gibt dabei Informationen oder Erlebnisse mit Worten weiter.", "example": "Meine Großmutter erzählt mir oft, wie das Leben früher war.", "is_phrase": false, "pos": "Verb"}, "erzählte": {"def": "Jemand hat anderen Personen etwas gesagt oder berichtet, was er erlebt oder gedacht hat. Hier bedeutet es, dass die Person den anderen Anwesenden von ihrer Erfahrung berichtet hat.", "example": "Nach dem Spiel erzählte er uns, wie aufgeregt er am Anfang gewesen war.", "is_phrase": false, "pos": "Verb"}, "essen": {"def": "Das Essen ist das, was man täglich zu sich nimmt, also die Mahlzeiten und Speisen. Hier macht sich die Mutter Sorgen darum, was ihr Sohn in der Ferne isst und ob er sich gut ernährt.", "example": "Meine Oma fragt mich jedes Mal, wenn ich anrufe, nach dem Essen, das ich in der Wohngemeinschaft zu mir nehme.", "is_phrase": false, "pos": "Substantiv"}, "feiertage": {"def": "Feiertage sind besondere Tage im Jahr, an denen die meisten Menschen nicht arbeiten und die oft mit Familie oder Freunden gefeiert werden. In diesem Kontext meint es wahrscheinlich Weihnachten oder eine ähnliche Ferienzeit.", "example": "Über die Feiertage besuche ich meine Großeltern und wir verbringen viel Zeit zusammen.", "is_phrase": false, "pos": "Substantiv"}, "fester": {"def": "Mit mehr Kraft und Stärke als sonst. Es beschreibt, dass etwas mit größerer Energie oder Wucht getan wird.", "example": "Sie schlug fester auf die Trommel als ihre Mitschülerinnen.", "is_phrase": false, "pos": "Adverb (Komparativ von 'fest')"}, "filmen": {"def": "Filme sind Geschichten, die man im Kino oder zu Hause auf einem Bildschirm ansehen kann. Hier meint die Person damit, dass das Leben ihres Bruders an der Universität so aussieht wie typische Szenen aus Filmen über das Studentenleben.", "example": "In den Filmen sieht das Leben an der Universität immer aufregend und lustig aus.", "is_phrase": false, "pos": "Substantiv (Plural)"}, "finde": {"def": "Wenn man etwas 'seltsam findet', bedeutet das, dass man etwas als merkwürdig oder ungewöhnlich wahrnimmt oder empfindet. Es drückt die persönliche Meinung oder das persönliche Gefühl zu etwas aus.", "example": "Ich finde es seltsam, dass er nie lacht.", "is_phrase": false, "pos": "Verb"}, "football-sammelkarte": {"def": "Eine kleine Sammelkarte mit dem Foto und den Daten eines bekannten Footballspielers. Solche Karten stehen für Ruhm und Erfolg im Sport – auf einer solchen Karte zu erscheinen bedeutet, ein bekannter und bewunderter Sportler geworden zu sein.", "example": "Der kleine Jonas träumte davon, eines Tages auf einer Football-Sammelkarte zu sein, so berühmt wie seine Lieblингsspieler.", "is_phrase": false, "pos": "Substantiv"}, "footballspiel": {"def": "Ein Footballspiel ist ein sportlicher Wettkampf im American Football, bei dem zwei Mannschaften gegeneinander spielen. Man schaut es oft gemeinsam mit Freunden oder Familie im Fernsehen oder im Stadion an.", "example": "Am Wochenende haben wir uns zusammen ein Footballspiel im Fernsehen angeschaut und dabei Pizza gegessen.", "is_phrase": false, "pos": "Substantiv"}, "footballteam": {"def": "Eine Gruppe von Spielern, die zusammen American Football spielen. In Amerika ist das eine sehr beliebte Sportart, und viele Schulen und Universitäten haben ein eigenes Team.", "example": "Er trainiert jeden Tag hart, weil er einen Platz im Footballteam seiner Universität bekommen möchte.", "is_phrase": false, "pos": "Substantiv"}, "foto": {"def": "Ein Foto ist ein Bild, das man mit einer Kamera macht. Es zeigt, wie eine Person oder ein Ort zu einem bestimmten Moment aussah.", "example": "Auf dem alten Foto aus der Schulzeit sieht meine Mutter sehr jung aus.", "is_phrase": false, "pos": "Substantiv"}, "fotos": {"def": "Ein Foto ist ein Bild, das man mit einer Kamera macht. Es zeigt, wie eine Person oder ein Ort zu einem bestimmten Moment ausgesehen hat.", "example": "Auf alten Fotos sieht mein Vater ganz anders aus als heute.", "is_phrase": false, "pos": "Substantiv"}, "frage": {"def": "'sich fragen' bedeutet, dass man über etwas nachdenkt und versucht, eine Antwort zu finden, die man nicht kennt. Man stellt die Frage nicht einer anderen Person, sondern sich selbst.", "example": "Ich fahre jeden Tag an diesem alten Haus vorbei und frage mich, wer früher darin gewohnt hat.", "is_phrase": true, "pos": "Redewendung"}, "fragt": {"def": "‚sich fragen' bedeutet, dass man über etwas nachdenkt und sich dabei eine Frage im Kopf stellt, ohne sie laut auszusprechen. Man wundert sich über etwas oder ist unsicher und denkt darüber nach, wie etwas ist oder warum etwas so ist.", "example": "Sie fragt sich, ob sie die richtige Entscheidung getroffen hat.", "is_phrase": true, "pos": "Verb"}, "fragte": {"def": "Wenn man jemandem eine Frage stellt, weil man eine Information haben möchte, dann fragt man. Hier wollte der Bruder wissen, ob die 710 Punkte aus einem Mathe-Test oder einem Sprachtest kommen.", "example": "Sie zeigte mir ein altes Foto und ich fragte: „Wer ist diese Person?\"", "is_phrase": false, "pos": "Verb"}, "freue": {"def": "\"Sich auf etwas freuen\" bedeutet, dass man auf ein Ereignis in der Zukunft wartet und dabei ein gutes, glückliches Gefühl hat. Man denkt gerne an dieses Ereignis, weil man es toll findet oder es einem wichtig ist.", "example": "Ich freue mich schon sehr auf meinen Urlaub nächsten Monat.", "is_phrase": true, "pos": "Redewendung (Verb mit Präposition)"}, "freund": {"def": "In Beleg 1 ist 'Freund' eine freundliche Anrede für eine Person, die man gut kennt und mag. In Beleg 2 ist 'Freund' der feste romantische Partner einer Frau.", "example": "Ihr Freund holt sie jeden Abend von der Arbeit ab.", "is_phrase": false, "pos": "Substantiv"}, "frostig": {"def": "So kalt, dass es fast gefriert oder bereits gefriert. Das Wort beschreibt sehr kaltes Wetter, bei dem die Temperatur unter oder knapp über null Grad liegt.", "example": "Im November waren die Nächte schon frostig, und morgens lag Eis auf den Fensterscheiben.", "is_phrase": false, "pos": "Adjektiv"}, "früher": {"def": "Das Wort 'früher' meint hier die Zeit, die schon lange vorbei ist, also die Vergangenheit. Es beschreibt eine Zeit, an die man sich erinnert, die aber nicht mehr existiert.", "example": "Meine Oma spricht oft von früher, wenn alles noch anders war.", "is_phrase": false, "pos": "Adverb (als Substantiv verwendet)"}, "für": {"def": "Die Phrase 'für meinen Teil' bedeutet: was mich persönlich betrifft oder wie ich die Dinge sehe. Man benutzt sie, um zu sagen, dass man nur von sich selbst spricht und nicht von anderen.", "example": "Für meinen Teil finde ich das neue Café sehr gemütlich, aber meine Freunde sehen das anders.", "is_phrase": true, "pos": "Präposition / Redewendung"}, "ganz": {"def": "Das Wort 'ganz' verstärkt hier das folgende Wort. Es bedeutet so viel wie 'besonders' oder 'sehr' und betont, dass etwas in hohem Maße zutrifft.", "example": "Sie hat das Problem ganz allein gelöst, ohne Hilfe von anderen.", "is_phrase": false, "pos": "Adverb"}, "ganze": {"def": "Mit 'das ganze Team' meint man alle Personen in der Gruppe, ohne Ausnahme. Kein einziges Mitglied wird ausgelassen.", "example": "Als der Lehrer den Witz erzählte, lachte die ganze Klasse.", "is_phrase": false, "pos": "Adjektiv"}, "gar": {"def": "In diesem Kontext verstärkt 'gar nicht' die Verneinung und bedeutet 'überhaupt nicht' oder 'völlig nicht'. Es drückt aus, dass etwas in keiner Weise oder in keinem Grad der Fall ist.", "example": "Er hat sich gar nicht verändert, obwohl ich ihn lange nicht gesehen habe.", "is_phrase": false, "pos": "Adverb"}, "gefallen": {"def": "Wenn etwas oder jemand dir gefällt, findest du es oder die Person schön oder attraktiv. Du hast ein gutes Gefühl dabei und magst es.", "example": "Dieser Schauspieler gefällt mir sehr – er sieht natürlich und sympathisch aus.", "is_phrase": false, "pos": "Verb"}, "gehalten": {"def": "'Ordnung halten' bedeutet, dass man dafür sorgt, dass alles an seinem richtigen Platz bleibt und es sauber und geordnet aussieht. Man bemüht sich aktiv darum, dass Unordnung nicht entsteht.", "example": "In der Schule ist es wichtig, dass alle Schüler in der Klasse Ordnung halten.", "is_phrase": true, "pos": "Redewendung"}, "gehasst": {"def": "Etwas hassen bedeutet, etwas sehr stark nicht mögen oder ablehnen. Man findet es sehr unangenehm oder störend.", "example": "Sie hat es immer gehasst, früh aufzustehen.", "is_phrase": false, "pos": "Verb"}, "gemacht": {"def": "Hier bedeutet 'etwas machen' so viel wie 'etwas tun' oder 'an etwas teilnehmen'. Es wird benutzt, wenn man eine Aktivität oder Sportart ausübt.", "example": "Früher hat sie viel Schwimmen gemacht, aber jetzt hat sie keine Zeit mehr dafür.", "is_phrase": false, "pos": "Verb"}, "genau": {"def": "Das Wort 'genau' bedeutet hier, dass man etwas mit Sicherheit und ohne Zweifel weiß. Man ist sich vollständig sicher, ohne dass etwas unklar bleibt.", "example": "Sie konnte nicht genau sagen, wann der Zug ankommen würde.", "is_phrase": false, "pos": "Adverb"}, "genauso": {"def": "Mit 'genauso' vergleicht man zwei Dinge und sagt, dass sie gleich sind. Hier bedeutet es: die Kinder sind in gleichem Maß glücklich, wie der Sprecher auf den alten Fotos glücklich aussieht.", "example": "Meine Schwester ist genauso talentiert wie mein Bruder.", "is_phrase": false, "pos": "Adverb"}, "gerade": {"def": "Das Wort bedeutet hier, dass etwas in diesem Moment oder vor sehr kurzer Zeit passiert ist. Es beschreibt eine Handlung, die zeitlich sehr nah an der Gegenwart liegt.", "example": "Meine Schwester hat gerade angerufen und gesagt, dass sie bald kommt.", "is_phrase": false, "pos": "Adverb"}, "gern": {"def": "Das Wort 'gern' zeigt, dass jemand etwas mit Freude oder Vorliebe tut. Es bedeutet, dass man etwas mag und es deshalb tut.", "example": "Sie liest gern Bücher, weil sie sich dabei entspannt.", "is_phrase": false, "pos": "Adverb"}, "geschehen": {"def": "Wenn etwas geschieht, passiert oder ereignet es sich. Man benutzt dieses Wort, wenn man fragt oder erzählt, was mit jemandem oder etwas passiert ist oder passieren wird.", "example": "Niemand weiß, was mit dem alten Haus geschehen wird, wenn die Familie es verkauft.", "is_phrase": false, "pos": "Verb"}, "geschichte": {"def": "Eine Geschichte ist eine Erzählung über etwas, das passiert ist oder passiert sein könnte. Man erzählt sie anderen Menschen, zum Beispiel zur Unterhaltung oder um von der Vergangenheit zu berichten.", "example": "Die Großmutter erzählt den Kindern jeden Abend eine spannende Geschichte.", "is_phrase": false, "pos": "Substantiv"}, "geschichten": {"def": "Erlebnisse oder Abenteuer, die so interessant oder aufregend sind, dass man sie anderen Leuten als spannende Erzählungen berichten kann. Es sind besondere Erfahrungen, über die man gerne spricht.", "example": "Nach seiner langen Reise durch Südamerika hatte er viele Geschichten, die er seinen Freunden erzählen konnte.", "is_phrase": false, "pos": "Substantiv"}, "gesehen": {"def": "Mit den Augen wahrnehmen, dass etwas existiert oder wie etwas aussieht. Hier bedeutet es, dass jemand Fotos angeschaut hat und dabei Informationen über eine Person bekommen hat.", "example": "Ich habe ein altes Video von meiner Oma gesehen, als sie noch ein Kind war.", "is_phrase": false, "pos": "Verb"}, "gesicht": {"def": "Der vordere Teil des Kopfes eines Menschen, mit Augen, Nase und Mund. Hier meint es auch den besonderen Ausdruck oder das Aussehen, das eine Person erkennbar macht.", "example": "Der alte Mann hatte ein markantes Gesicht mit tiefen Falten und freundlichen Augen.", "is_phrase": false, "pos": "Substantiv"}, "gesichter": {"def": "Das Gesicht ist der vordere Teil des Kopfes mit Augen, Nase und Mund. Hier spricht man von mehreren Gesichtern verschiedener Menschen auf Fotos.", "example": "Auf dem alten Familienfoto sieht man die Gesichter meiner Großeltern – sie wirken so lebendig und ausdrucksstark.", "is_phrase": false, "pos": "Substantiv (Plural)"}, "gespielt": {"def": "Wenn man eine Sportart spielt, nimmt man regelmäßig daran teil und macht das als Aktivität oder Hobby. Hier bedeutet es, dass Dad Baseball als Sport aktiv betrieben hat.", "example": "Als Kind hat sie drei Jahre lang Fußball gespielt, bis sie mit dem Tennis angefangen hat.", "is_phrase": false, "pos": "Verb"}, "getroffen": {"def": "Einen Ball mit dem Fuß, der Hand oder einem Schläger berühren und dabei stoßen oder schlagen. Hier bedeutet es, dass der Ball sehr stark und genau geschlagen wurde.", "example": "Der Spieler hat den Ball so gut getroffen, dass er direkt ins Tor flog.", "is_phrase": false, "pos": "Verb"}, "gewann": {"def": "Wenn eine Person oder eine Gruppe ein Spiel oder einen Wettkampf gewinnt, bedeutet das, dass sie besser war als alle anderen und am Ende die Beste ist. Hier hat das Team den ersten Platz in der Meisterschaft erreicht.", "example": "Die Mannschaft trainierte hart den ganzen Sommer und gewann am Ende das Turnier.", "is_phrase": false, "pos": "Verb"}, "glauben": {"def": "Wenn man jemandem etwas glaubt, denkt man, dass das, was diese Person sagt, wahr ist. Man vertraut den Worten dieser Person.", "example": "Er erzählte uns, dass er krank war, und wir haben ihm das geglaubt.", "is_phrase": false, "pos": "Verb"}, "gleiche": {"def": "Wenn etwas 'die gleiche' ist, bedeutet das, dass es sich nicht verändert hat und immer wieder genau so ist wie vorher. Es ist jedes Mal dasselbe, ohne Unterschied.", "example": "Jeden Morgen geht er denselben Weg zur Arbeit – es ist immer die gleiche Strecke.", "is_phrase": false, "pos": "Adjektiv (Pronomen)"}, "glücklich": {"def": "Wenn man glücklich ist, fühlt man sehr große Freude und Zufriedenheit im Leben. Hier bedeutet es, dass die Kinder dieses gute, schöne Gefühl wirklich in sich tragen sollen.", "example": "Sie weiß nicht, dass sie gerade in einem der schönsten Momente ihres Lebens so glücklich ist.", "is_phrase": false, "pos": "Adjektiv"}, "glücklicher": {"def": "Wenn jemand glücklicher wirkt als eine andere Person, sieht er auf andere Menschen zufriedener und fröhlicher aus, auch wenn das vielleicht nicht wirklich so war. 'Glücklicher' ist hier die Vergleichsform von 'glücklich'.", "example": "Auf alten Familienfotos wirken meine Großeltern immer glücklicher als ich mich heute fühle.", "is_phrase": false, "pos": "Adjektiv (Komparativ)"}, "goldene": {"def": "'Goldene Zeiten' bedeutet eine Zeit, in der es jemandem sehr gut geht oder gegangen ist – zum Beispiel wirtschaftlich oder persönlich. Es ist eine Zeit, an die man gerne zurückdenkt, weil alles besser oder schöner war als heute.", "example": "In den 1950er Jahren erlebte die Stadt ihre goldenen Zeiten: viele Menschen fanden Arbeit und das Leben wurde einfacher.", "is_phrase": true, "pos": "Redewendung"}, "goldenen": {"def": "Eine goldene Zeit ist eine besonders schöne und glückliche Phase im Leben eines Menschen. Man nennt eine Zeit so, wenn man sich später gern daran erinnert oder wenn es einem sehr gut geht.", "example": "Als die Kinder noch klein waren, waren das goldene Zeiten für die ganze Familie.", "is_phrase": true, "pos": "Adjektiv"}, "golffreunden": {"def": "Menschen, mit denen man zusammen Golf spielt und die man gut kennt. Golf ist ein Sport, bei dem man einen kleinen Ball mit einem langen Stock in ein Loch schlägt.", "example": "Am Wochenende treffe ich mich mit meinen Golffreunden auf dem Golfplatz.", "is_phrase": false, "pos": "Substantiv (Plural)"}, "große": {"def": "Hier bedeutet 'groß' nicht körperlich groß, sondern wichtig oder ernst. Man verwendet es, um zu zeigen, dass etwas sehr bedeutsam oder besorgniserregend ist.", "example": "Es gab die große Angst, dass das Konzert abgesagt werden würde.", "is_phrase": false, "pos": "Adjektiv"}, "gut": {"def": "Wenn jemand in etwas 'gut' ist, bedeutet das, dass diese Person etwas sehr gut kann und mehr Fähigkeiten hat als andere. In Beleg 1 bedeutet 'jemandem guttun', dass etwas für eine Person positiv oder wohltuend ist.", "example": "Sie spielt seit Jahren Klavier und ist wirklich gut darin.", "is_phrase": false, "pos": "Adjektiv / Adverb"}, "gute": {"def": "Etwas, das positiv ist und Freude oder Erleichterung bringt. Eine gute Nachricht ist eine Information, über die man sich freut.", "example": "Die gute Nachricht ist, dass die Prüfung verschoben wurde.", "is_phrase": false, "pos": "Adjektiv"}, "habe": {"def": "Das Wort 'habe' ist eine Form des Hilfsverbs 'haben'. Es wird zusammen mit einem anderen Verb benutzt, um die Vergangenheit auszudrücken (Perfekt): etwas ist schon passiert.", "example": "Ich habe gestern einen langen Brief geschrieben.", "is_phrase": false, "pos": "Verb (Hilfsverb)"}, "hatten": {"def": "Das Wort 'hatten' ist die Vergangenheitsform von 'haben'. Es zeigt, dass jemand in der Vergangenheit etwas besaß oder dass etwas in der Vergangenheit vorhanden war.", "example": "Die Mannschaft hatten am Ende des Spiels noch zwei Chancen, ein Tor zu schießen.", "is_phrase": false, "pos": "Verb (Hilfsverb, Vergangenheit)"}, "hause": {"def": "Die Phrase 'nach Hause kommen' bedeutet, dass eine Person an den Ort zurückkommt, wo sie wohnt oder wo ihre Familie lebt. Man benutzt sie, wenn jemand nach einer Reise oder langen Abwesenheit wieder zu den eigenen Leuten zurückkehrt.", "example": "Nach einem langen Arbeitstag freue ich mich immer, wenn ich endlich nach Hause komme.", "is_phrase": true, "pos": "Redewendung"}, "heimlaufen": {"def": "Nach Hause laufen oder gehen, zum Beispiel nach der Schule oder der Arbeit. Man bewegt sich zu Fuß in Richtung nach Hause.", "example": "Das Heimlaufen nach der Schule hat mir immer Spaß gemacht, weil ich dabei mit Freunden reden konnte.", "is_phrase": false, "pos": "Verb (Substantivierung)"}, "herbstwetter": {"def": "Das Wetter, das typisch für den Herbst ist – oft mild, sonnig und angenehm, bevor es kälter wird. In diesem Kontext ist damit besonders das schöne, angenehme Wetter im Herbst gemeint.", "example": "Wir haben das Herbstwetter genutzt und sind jeden Tag spazieren gegangen.", "is_phrase": false, "pos": "Substantiv"}, "herum": {"def": "'Um sich herum' bedeutet, dass man auf alles schaut, was sich in der Nähe befindet – also auf die Menschen und Dinge, die man um sich sieht. Es beschreibt den Bereich rund um eine Person.", "example": "Sie saß im Café und beobachtete die Menschen um sich herum.", "is_phrase": true, "pos": "Adverb"}, "heute": {"def": "In diesem Kontext bedeutet 'heute' nicht nur 'an diesem Tag', sondern 'in der Gegenwart' oder 'in der jetzigen Zeit'. Es beschreibt, wie jemand im Moment ist – im Vergleich zu früher.", "example": "Mein Bruder ist heute ein anderer Mensch als in seiner Jugend.", "is_phrase": false, "pos": "Adverb"}, "highschool": {"def": "Die Highschool ist eine weiterführende Schule in den USA und anderen englischsprachigen Ländern. Sie entspricht ungefähr der deutschen Oberschule oder dem Gymnasium.", "example": "Meine Cousine lebt in Amerika und geht dort auf die Highschool.", "is_phrase": false, "pos": "Substantiv"}, "hingehen": {"def": "Wenn etwas 'hingeht', bedeutet das, dass es sich in eine bestimmte Richtung oder an einen bestimmten Ort bewegt. Hier beschreibt es den Weg, den der Ball nach dem Wurf nehmen wird.", "example": "Der Spieler beobachtete den Ball genau und wusste sofort, wohin er hingehen würde.", "is_phrase": false, "pos": "Verb"}, "hoffentlich": {"def": "Man benutzt 'hoffentlich', wenn man sich etwas wünscht und hofft, dass es so passiert. Es zeigt, dass man nicht sicher ist, ob es wirklich passieren wird.", "example": "Hoffentlich kommt meine Mutter morgen zu meinem Konzert.", "is_phrase": false, "pos": "Adverb"}, "homerun": {"def": "Ein Homerun ist ein besonderer Schlag beim Baseball, bei dem der Ball so weit fliegt, dass der Spieler alle vier Male auf dem Spielfeld läuft und einen Punkt für sein Team holt. Es ist der beste und wichtigste Schlag, den ein Spieler machen kann.", "example": "Der Spieler traf den Ball perfekt und schlug einen Homerun – das Stadion jubelte laut.", "is_phrase": false, "pos": "Substantiv"}, "homeruns": {"def": "Ein Homerun ist im Baseball ein besonders erfolgreicher Schlag, bei dem der Spieler alle Punkte für sein Team holt. Im Text steht das Wort als Symbol für einen großen Erfolg oder eine besondere Leistung im Sport.", "example": "Die Sportler, die heute Homeruns schlagen und Rekorde brechen, werden eines Tages ihre eigenen Kinder haben.", "is_phrase": false, "pos": "Substantiv"}, "häh": {"def": "‚Häh?' sagt man, wenn man etwas nicht versteht oder wenn etwas überraschend oder seltsam ist. Hier zeigt der Spieler damit, dass er die Frage nicht versteht, weil sie keinen Sinn für ihn ergibt.", "example": "Sie sagte, dass das Essen aus dem Jahr 1987 stammt. Er schaute sie an und fragte: „Häh?\"", "is_phrase": false, "pos": "Interjektion"}, "hängen": {"def": "Wenn etwas an einer Wand hängt, ist es dort befestigt und schwebt in der Luft, ohne den Boden zu berühren. Man benutzt dieses Wort, um zu sagen, dass Bilder, Poster oder andere Dinge an der Wand angebracht sind.", "example": "An der Wand hängen viele bunte Bilder von meiner Lieblingsband.", "is_phrase": false, "pos": "Verb"}, "hätte": {"def": "Dieses Wort ist die Konjunktiv-II-Form von 'haben' und drückt hier aus, dass etwas in der Zukunft möglich wäre, wenn eine bestimmte Bedingung erfüllt wird. Es beschreibt eine Situation, die noch nicht real ist, aber vorstellbar ist.", "example": "Wenn ich diese Reise machen würde, hätte ich viele tolle Erinnerungen.", "is_phrase": false, "pos": "Verb (Konjunktiv II)"}, "innings": {"def": "Ein Innings ist ein Abschnitt in einem Baseballspiel. Das letzte Innings ist der letzte Spielabschnitt, in dem eine Mannschaft noch die Chance hat, zu gewinnen.", "example": "Im letzten Innings der Partie gelang der Mannschaft noch der entscheidende Treffer.", "is_phrase": false, "pos": "Substantiv"}, "ins": {"def": "'Ins' ist eine Kurzform von 'in das'. Es zeigt hier eine Richtung oder ein Ziel an, nämlich dass jemand Teil von etwas wird oder in eine Gruppe aufgenommen wird.", "example": "Sie hat sehr hart trainiert, um ins Nationalteam zu kommen.", "is_phrase": false, "pos": "Präposition + Artikel (Verschmelzung)"}, "irgendetwas": {"def": "Irgendetwas bedeutet hier eine beliebige Sache, die nicht genau bestimmt ist. In diesem Satz bedeutet es, dass der Vater nichts Zusätzliches oder Falsches zu einer Geschichte hinzufügt.", "example": "Sie ist ehrlich und erfindet irgendetwas dazu, wenn sie eine Geschichte erzählt.", "is_phrase": false, "pos": "Indefinitpronomen"}, "irgendwann": {"def": "Zu einem nicht genau bestimmten Zeitpunkt in der Vergangenheit oder Zukunft. Man weiß nicht genau, wann es passiert ist oder passieren wird.", "example": "Wir redeten lange über viele Themen, und irgendwann kamen wir auf das Thema Schule.", "is_phrase": false, "pos": "Adverb"}, "irgendwer": {"def": "‚Irgendwer' bedeutet eine beliebige Person, ohne zu sagen, wer genau gemeint ist. Hier wird es benutzt, um zu sagen, dass niemand anderes so schön ist wie diese Person.", "example": "Sie singt besser als irgendwer sonst in der ganzen Schule.", "is_phrase": false, "pos": "Indefinitpronomen"}, "irgendwie": {"def": "Man benutzt 'irgendwie', wenn man etwas fühlt oder denkt, aber nicht genau erklären kann warum. Es zeigt, dass man sich nicht ganz sicher ist.", "example": "Das alte Foto macht mich irgendwie traurig, obwohl ich die Menschen darauf nicht kenne.", "is_phrase": false, "pos": "Adverb"}, "isst": {"def": "Essen bedeutet, Nahrung in den Mund nehmen und schlucken. Hier beschreibt es, welche Speisen der Bruder zu sich nimmt.", "example": "Die Mutter macht sich Sorgen, weil ihr Kind in der neuen Stadt nicht gesund isst.", "is_phrase": false, "pos": "Verb"}, "jahr": {"def": "Ein Jahr ist ein Zeitraum von zwölf Monaten. Hier bedeutet es eine Klassenstufe oder Schulstufe, also wie weit man in der Schule schon fortgeschritten ist.", "example": "Sie ist in ihrem zweiten Jahr an der Universität und fühlt sich jetzt viel sicherer.", "is_phrase": false, "pos": "Substantiv"}, "jahre": {"def": "Ein Jahr ist eine Zeiteinheit von zwölf Monaten. Hier zeigt 'zwei Jahre lang', wie viel Zeit jemand mit einer Aktivität verbracht hat.", "example": "Sie hat drei Jahre lang Klavier gelernt und kann jetzt sehr gut spielen.", "is_phrase": false, "pos": "Substantiv"}, "jedenfalls": {"def": "Man sagt 'jedenfalls', wenn man etwas betonen möchte, das sicher oder wichtig ist – auch wenn andere Dinge unsicher sind. Es zeigt, dass dieser eine Punkt auf jeden Fall gilt.", "example": "Ich weiß nicht, ob das Fest schön wird, aber jedenfalls freue ich mich darauf.", "is_phrase": false, "pos": "Adverb"}, "jung": {"def": "Eine Person ist jung, wenn sie noch nicht viele Jahre gelebt hat und sich in einem frühen Teil ihres Lebens befindet. Das Gegenteil von jung ist alt.", "example": "Auf diesem alten Foto sieht man meinen Großvater, als er noch jung war.", "is_phrase": false, "pos": "Adjektiv"}, "junge": {"def": "Ein männliches Kind oder ein junger Mann. In Geschichten ist 'der Junge' oft die männliche Hauptperson, die etwas erlebt oder jemanden trifft.", "example": "In dem Film verliebt sich der Junge in seine Nachbarin, die Bücher liebt.", "is_phrase": false, "pos": "Substantiv"}, "jungen": {"def": "Ein männliches Kind oder ein junger männlicher Mensch. Das Wort beschreibt hier eine Person, die noch nicht erwachsen ist oder als jung wahrgenommen wird.", "example": "Der Junge auf dem Spielplatz lief sehr schnell und gewann das Rennen.", "is_phrase": false, "pos": "Substantiv"}, "jünger": {"def": "Jünger bedeutet, dass eine Person weniger Jahre gelebt hat als eine andere Person oder als ein Vergleichspunkt. Es ist die Vergleichsform von 'jung'.", "example": "Sie ist jünger als ihre Schwester, deshalb darf sie noch nicht alleine ins Kino gehen.", "is_phrase": false, "pos": "Adjektiv"}, "kakao": {"def": "Kakao ist ein warmes oder kaltes Getränk aus Milch und Kakaopulver, das süß und schokoladig schmeckt. Es ist ein beliebtes Getränk, das oft als gemütlich und ruhig gilt.", "example": "An einem kalten Abend saß sie auf dem Sofa und trank einen heißen Kakao.", "is_phrase": false, "pos": "Substantiv"}, "kalt": {"def": "Hier beschreibt 'kalt und frostig' zusammen, dass die Stimmung oder die Beziehung zwischen Menschen unfreundlich und distanziert wird. Die Menschen sind nicht mehr herzlich und warm zueinander.", "example": "Seit dem Streit ist die Atmosphäre im Büro kalt und frostig – niemand spricht mehr miteinander.", "is_phrase": true, "pos": "Adjektiv"}, "kamen": {"def": "Mit 'auf etwas kommen' meint man, dass man anfängt, über ein bestimmtes Thema zu sprechen. Das Gespräch wechselt zu diesem neuen Thema.", "example": "Nach einer Weile kamen wir auf das Wetter und hörten gar nicht mehr auf zu reden.", "is_phrase": true, "pos": "Redewendung"}, "kennenlernt": {"def": "Jemanden kennenlernen bedeutet, eine Person zum ersten Mal zu treffen und mehr über sie zu erfahren. Oft beginnt dadurch eine Freundschaft oder eine Liebesbeziehung.", "example": "Auf der Universität lernt er eine interessante Frau kennen, und sie werden bald ein Paar.", "is_phrase": false, "pos": "Verb"}, "kinder": {"def": "Die eigenen Söhne und Töchter einer Person. Hier sind es die Kinder des Mannes, der auf dem Foto zu sehen ist.", "example": "Die Kinder freuten sich sehr, als sie alte Fotos von ihrem Vater fanden.", "is_phrase": false, "pos": "Substantiv"}, "kindern": {"def": "Die eigenen Kinder sind die Söhne und Töchter einer Person. Das Wort steht hier im Plural und bezeichnet die Nachkommen der sprechenden Person.", "example": "Sie möchte ihren Kindern eines Tages erzählen, wie sie sich als junger Mensch gefühlt hat.", "is_phrase": false, "pos": "Substantiv (Plural)"}, "kleiderschrank": {"def": "Ein Kleiderschrank ist ein großes Möbelstück im Schlafzimmer oder Zimmer, in dem man Kleidung aufbewahrt und ordnet. Man hängt dort zum Beispiel Jacken und Hemden auf oder legt Pullover und Hosen hinein.", "example": "Sie räumte alle Sommerkleider in den Kleiderschrank und legte sie sorgfältig zusammen.", "is_phrase": false, "pos": "Substantiv"}, "kluges": {"def": "Eine Person, die klug ist, denkt schnell und gut nach, versteht Dinge leicht und hat viel Wissen. Das Wort beschreibt hier ein Mädchen, das intelligent und nachdenklich ist.", "example": "Meine Schwester ist sehr klug – sie löst schwierige Aufgaben immer schnell.", "is_phrase": false, "pos": "Adjektiv"}, "kurse": {"def": "Ein Kurs ist eine Reihe von Unterrichtsstunden zu einem bestimmten Thema, zum Beispiel an einer Schule oder Universität. Man lernt dort regelmäßig etwas Neues.", "example": "Die Studentin berichtet ihren Eltern von ihren Kursen und welche Fächer sie dieses Semester belegt hat.", "is_phrase": false, "pos": "Substantiv"}, "könnte": {"def": "Das Wort 'könnte' ist die Konjunktiv-II-Form von 'können'. Es drückt aus, dass etwas möglich wäre oder dass man die Fähigkeit oder Möglichkeit hätte, etwas zu tun – aber es ist nicht sicher oder noch nicht passiert.", "example": "Wenn ich mehr Zeit hätte, könnte ich jeden Tag ein Buch lesen.", "is_phrase": false, "pos": "Verb (Modalverb, Konjunktiv II)"}, "küssen": {"def": "Wenn sich zwei Menschen küssen, berühren sie sich mit den Lippen als Zeichen von Zuneigung oder Liebe. Es zeigt, dass zwei Menschen romantische Gefühle füreinander haben.", "example": "Die beiden Jugendlichen küssen sich zum ersten Mal auf dem Schulhof.", "is_phrase": false, "pos": "Verb"}, "lachte": {"def": "Lachen bedeutet, dass man ein fröhliches Geräusch macht, weil man etwas komisch oder lustig findet. Hier lachte das Team, weil die Frage des Bruders einen witzigen Missverständnis gezeigt hat.", "example": "Als der Comedian den Witz erzählte, lachte das ganze Publikum laut.", "is_phrase": false, "pos": "Verb"}, "lag": {"def": "Wenn ein Team 'zurückliegt', hat es weniger Punkte als das andere Team und ist im Rückstand. Hier bedeutet es, dass Dads Team einen Run weniger hatte als der Gegner.", "example": "Zur Halbzeit lag unsere Mannschaft zwei Tore zurück, aber am Ende haben wir noch gewonnen.", "is_phrase": false, "pos": "Verb"}, "lang": {"def": "Das Wort 'lang' steht nach einer Zeitangabe und zeigt an, wie lange etwas dauert oder gedauert hat. Es betont die Dauer einer Handlung oder eines Zustands.", "example": "Sie hat drei Stunden lang auf den Bus gewartet.", "is_phrase": false, "pos": "Adverb"}, "langsam": {"def": "Hier bedeutet 'langsam' so viel wie 'allmählich' oder 'nach und nach'. Es zeigt, dass sich etwas über eine gewisse Zeit verändert und nun einen neuen Zustand erreicht.", "example": "Langsam wird es draußen dunkel – wir sollten nach Hause gehen.", "is_phrase": false, "pos": "Adverb"}, "leben": {"def": "Die gesamte Zeit, die eine Person lebt, von der Geburt bis zum Tod. Man meint damit alle Erfahrungen und Momente, die jemand in dieser Zeit gemacht hat.", "example": "Das war der schönste Tag in meinem ganzen Leben.", "is_phrase": false, "pos": "Substantiv"}, "letzten": {"def": "Etwas ist das letzte in einer Reihe, wenn es keinen weiteren Teil danach gibt. Hier beschreibt es den abschließenden Abschnitt eines Spiels.", "example": "Im letzten Kapitel des Buches wird alles erklärt.", "is_phrase": false, "pos": "Adjektiv"}, "liebe": {"def": "\"Alles Liebe\" ist eine feste Formel, die man am Ende eines Briefes oder einer Nachricht schreibt. Man drückt damit aus, dass man der anderen Person gute Gefühle und herzliche Grüße schickt.", "example": "Sie beendete ihren Brief an ihre Schwester mit den Worten: \"Alles Liebe, deine Maria.\"", "is_phrase": true, "pos": "Redewendung"}, "lieber": {"def": "Ein Wort, das man am Anfang eines Briefes oder einer Nachricht benutzt, um jemanden freundlich anzusprechen. Es zeigt, dass man die Person mag und ihr nahesteht.", "example": "Liebe Maria, ich hoffe, es geht dir gut!", "is_phrase": false, "pos": "Adjektiv"}, "machte": {"def": "Hier bedeutet 'machen', dass etwas eine bestimmte Wirkung auf eine Person hat oder sie in einen bestimmten Zustand bringt. Der Sport hat dazu geführt, dass die Person aggressiv wurde.", "example": "Die schlechte Nachricht machte ihn sehr traurig.", "is_phrase": false, "pos": "Verb"}, "mal": {"def": "Das Wort 'mal' wird hier als Abtönungspartikel verwendet und macht eine Aussage weicher oder weniger direkt. Es zeigt, dass etwas nicht ganz sicher ist oder gibt einem Satz einen weniger bestimmten, eher beiläufigen Ton.", "example": "Wenn ich das richtig verstehe, ist das mal so eine Art Missverständnis.", "is_phrase": false, "pos": "Partikel"}, "manchmal": {"def": "Das Wort bedeutet, dass etwas zu bestimmten Zeiten passiert, aber nicht immer und nicht regelmäßig. Es beschreibt etwas, das ab und zu vorkommt.", "example": "Manchmal gehe ich nach der Arbeit spazieren, aber nicht jeden Tag.", "is_phrase": false, "pos": "Adverb"}, "markante": {"def": "Ein markantes Gesicht hat besondere, starke Züge, die man sich gut merken kann und die interessant oder ausdrucksvoll wirken. Solche Gesichter sehen nicht gewöhnlich aus, sondern fallen sofort auf.", "example": "Der alte Mann auf dem Foto hatte ein markantes Gesicht mit einer großen Nase und tiefen Falten.", "is_phrase": false, "pos": "Adjektiv"}, "markantes": {"def": "Ein markantes Gesicht sieht sehr besonders und einprägsam aus – man erinnert sich leicht daran. Es hat starke, auffällige Züge, die man nicht so schnell vergisst.", "example": "Der alte Schauspieler hatte ein markantes Gesicht mit tiefen Falten und kräftigen Augenbrauen.", "is_phrase": false, "pos": "Adjektiv"}, "mathe": {"def": "Mathematik ist ein Schulfach, in dem man mit Zahlen und Formeln arbeitet. Der Bruder fragt, ob die 710 Punkte eine Note oder ein Ergebnis aus dem Fach Mathematik sind – weil er denkt, dass es sich um Schulnoten oder Testergebnisse handelt, obwohl der Spieler eigentlich Punkte aus einem Spiel meint.", "example": "In Mathe haben wir heute eine schwierige Aufgabe mit großen Zahlen gerechnet.", "is_phrase": false, "pos": "Substantiv"}, "meisten": {"def": "Das Wort 'meisten' bedeutet hier: der größte Teil einer Gruppe. Er war jünger als fast alle anderen in der Gruppe.", "example": "Sie war die jüngste Schülerin und kleiner als die meisten anderen in ihrer Klasse.", "is_phrase": false, "pos": "Adjektiv"}, "meisterschaft": {"def": "Die Meisterschaft ist ein wichtiger Wettkampf, bei dem das beste Team oder die beste Person in einer Sportart ermittelt wird. Wer die Meisterschaft gewinnt, ist der offizielle Champion oder Sieger in dieser Sportart.", "example": "Die Fußballmannschaft hat hart trainiert und am Ende die Meisterschaft gewonnen.", "is_phrase": false, "pos": "Substantiv"}, "menge": {"def": "Die Phrase 'jede Menge' bedeutet 'sehr viel' oder 'sehr viele'. Man benutzt sie, wenn man sagen möchte, dass die Menge von etwas sehr groß ist.", "example": "Im Supermarkt gab es jede Menge Angebote, ich wusste gar nicht, was ich kaufen sollte.", "is_phrase": true, "pos": "Redewendung"}, "menschen": {"def": "Personen, also einzelne menschliche Wesen. Das Wort bezeichnet hier konkrete Individuen mit ihrer eigenen Geschichte und Persönlichkeit.", "example": "Die Menschen in meiner Familie haben sich über die Jahre sehr verändert.", "is_phrase": false, "pos": "Substantiv"}, "millionär": {"def": "Ein Millionär ist eine Person, die sehr viel Geld besitzt – mindestens eine Million Euro oder mehr. Hier bedeutet es, dass der Spieler durch seinen Sport sehr reich werden wird.", "example": "Obwohl er als Kind arm war, wurde er durch seine Karriere als Fußballspieler später Millionär.", "is_phrase": false, "pos": "Substantiv"}, "mom": {"def": "Ein informelles Wort für die Mutter, das vor allem im amerikanischen Sprachraum üblich ist. Es wird oft so verwendet, als wäre es ein Name, deshalb wird es großgeschrieben.", "example": "Mom hat heute gekocht und auf uns gewartet, bis wir nach Hause kamen.", "is_phrase": false, "pos": "Substantiv"}, "moment": {"def": "Ein Moment ist ein sehr kurzer, bestimmter Zeitpunkt oder eine kurze Situation, die besonders wichtig oder bedeutsam ist. Hier meint es einen besonderen Augenblick, an den man sich später erinnert.", "example": "Der erste Schritt ihres Kindes war ein Moment, den sie nie vergessen würde.", "is_phrase": false, "pos": "Substantiv"}, "musste": {"def": "Wenn man etwas tun 'muss', hat man keine andere Wahl. Hier bedeutet es, dass der Vater gezwungen war, mit Baseball aufzuhören, weil die neue Situation in der Familie es nicht mehr erlaubte.", "example": "Als sie krank wurde, musste sie die Reise absagen.", "is_phrase": false, "pos": "Verb (Modalverb, Vergangenheit)"}, "mutter": {"def": "Die Mutter ist die Frau, die ein Kind geboren hat oder die ein Kind großzieht. Sie ist ein wichtiger Mensch in der Familie.", "example": "Meine Mutter hat mir als Kind jeden Abend eine Geschichte erzählt.", "is_phrase": false, "pos": "Substantiv"}, "mädchen": {"def": "Ein Mädchen ist eine weibliche Person, die jung ist. In diesen Textstellen meint es eine junge Frau, die der Sprecher sympathisch und auf eine natürliche, besondere Art schön findet.", "example": "In dem Film lernt der Held ein Mädchen kennen, das sehr klug ist und ihn zum Lachen bringt.", "is_phrase": false, "pos": "Substantiv"}, "möchten": {"def": "'Möchten' drückt aus, dass jemand einen Wunsch oder ein Verlangen hat. Hier fragt Charlie, ob die Menschen um ihn herum wirklich so leben, wie sie es sich wünschen oder ersehnen.", "example": "Sie fragt sich manchmal, ob sie wirklich den Beruf ausübt, den sie möchte.", "is_phrase": false, "pos": "Verb (Modalverb)"}, "müsse": {"def": "Das ist die Konjunktiv-I-Form von 'müssen'. Man benutzt diese Form, wenn man wiedergibt, was eine andere Person gesagt hat – hier: die Ärzte haben gesagt, dass er aufhören muss.", "example": "Die Lehrerin sagte, er müsse die Hausaufgaben bis morgen abgeben.", "is_phrase": false, "pos": "Verb (Konjunktiv I)"}, "müssen": {"def": "Etwas 'machen müssen' bedeutet, dass man keine Wahl hatte und etwas tun war notwendig oder verpflichtend. Man konnte es nicht vermeiden.", "example": "Als Kind habe ich jeden Abend mein Zimmer aufräumen müssen.", "is_phrase": false, "pos": "Verb (Modalverb)"}, "nachricht": {"def": "Eine Information oder ein Fakt, den man erfährt und der positiv oder negativ sein kann. Hier bedeutet 'die gute Nachricht', dass etwas Schönes oder Erfreuliches passiert oder bekannt wird.", "example": "Die gute Nachricht ist, dass ich die Prüfung bestanden habe.", "is_phrase": false, "pos": "Substantiv"}, "nehme": {"def": "'Ich nehme an' bedeutet, dass man glaubt, dass etwas wahrscheinlich stimmt, aber nicht sicher ist. Man sagt damit, dass es die eigene Meinung oder Vermutung ist.", "example": "Er ist noch nicht da – er hat den Bus verpasst, nehme ich an.", "is_phrase": true, "pos": "Redewendung"}, "nennen": {"def": "Hier bedeutet 'nennen', dass man einem Konzept oder einer Erfahrung einen bestimmten Namen oder eine Bezeichnung gibt. Der Satz 'was wir Leben nennen' meint: das, was die Menschen mit dem Wort 'Leben' beschreiben oder bezeichnen.", "example": "Die Zeit, die wir Kindheit nennen, ist für viele Menschen die glücklichste Phase ihres Lebens.", "is_phrase": false, "pos": "Verb"}, "nervös": {"def": "Eine Person ist nervös, wenn sie unruhig ist und sich Sorgen macht oder Angst hat. Das Herz schlägt schneller, und man kann nicht ruhig bleiben.", "example": "Vor der Prüfung war sie so nervös, dass sie kaum schlafen konnte.", "is_phrase": false, "pos": "Adjektiv"}, "nie": {"def": "Zu keinem Zeitpunkt, weder in der Vergangenheit noch in der Zukunft. Es bedeutet, dass etwas überhaupt nicht passiert oder passiert ist.", "example": "Ich habe diesen Film noch nie gesehen.", "is_phrase": false, "pos": "Adverb"}, "noten": {"def": "Noten sind die Bewertungen, die Schüler oder Studenten für ihre Leistungen in der Schule oder an der Universität bekommen. Sie zeigen, wie gut jemand in einem Fach ist.", "example": "Die Eltern fragen ihren Sohn nach jedem Test sofort nach seinen Noten.", "is_phrase": false, "pos": "Substantiv"}, "nächsten": {"def": "Wird benutzt, um etwas zu beschreiben, das direkt nach dem aktuellen Moment oder dem aktuellen Ding kommt. Hier meint es den Ball, der nach dem vorherigen geworfen wird.", "example": "Der Spieler schlug den nächsten Ball weit ins Feld.", "is_phrase": false, "pos": "Adjektiv"}, "obwohl": {"def": "Mit 'obwohl' verbindet man zwei Sätze, wenn etwas passiert oder gilt, auch wenn es einen Grund gibt, der dagegen spricht. Es zeigt einen Gegensatz oder Widerspruch zwischen zwei Aussagen.", "example": "Sie hat die Prüfung bestanden, obwohl sie kaum gelernt hat.", "is_phrase": false, "pos": "Konjunktion"}, "offenbar": {"def": "Man benutzt 'offenbar', wenn etwas so aussieht oder sich so anfühlt, dass man fast sicher ist, dass es so ist. Es zeigt, dass man etwas aus Anzeichen schließt, ohne es zu 100 Prozent zu wissen.", "example": "Er kam zu spät und hatte keine Hausaufgaben dabei – offenbar hatte er den Unterricht vergessen.", "is_phrase": false, "pos": "Adverb"}, "oft": {"def": "Das Wort 'oft' bedeutet, dass etwas viele Male passiert oder ein häufiger Zustand ist. Hier sagt es, dass es eine übliche oder typische Sache ist, die man bei alten Fotos immer wieder beobachten kann.", "example": "Es ist oft so, dass man erst nach einer Reise merkt, wie schön sie war.", "is_phrase": false, "pos": "Adverb"}, "ordnung": {"def": "Die Phrase 'Ordnung halten' bedeutet, dass man Dinge an ihrem richtigen Platz lässt und dafür sorgt, dass alles sauber und ordentlich ist. Man achtet darauf, dass nichts durcheinander gerät.", "example": "Sie hält in ihrer kleinen Wohnung immer Ordnung, obwohl sie sehr wenig Zeit hat.", "is_phrase": true, "pos": "Redewendung"}, "paar": {"def": "'Ein paar' bedeutet eine kleine, nicht genaue Anzahl von etwas. Man benutzt es, wenn man sagt, dass es mehr als zwei, aber nicht sehr viele sind.", "example": "Ich brauche noch ein paar Minuten, dann bin ich fertig.", "is_phrase": true, "pos": "Artikel + Indefinitpronomen"}, "passieren": {"def": "Die Phrase 'es wird ihm nichts passieren' bedeutet, dass man glaubt, dass eine Person in Sicherheit ist und ihr nichts Schlimmes oder Gefährliches zustoßen wird. Man benutzt sie, um jemanden zu beruhigen, der sich Sorgen macht.", "example": "Die Mutter machte sich Sorgen um ihre Tochter, aber der Vater sagte: „Sie ist vernünftig, ihr wird nichts passieren.\"", "is_phrase": true, "pos": "Verb (feste Phrase: 'jemandem passieren')"}, "patrick": {"def": "Patrick ist hier ein männlicher Vorname und bezeichnet eine bestimmte Person, die ein Freund oder Bekannter des Erzählers ist. Er gehört zur Gruppe von Menschen, mit denen der Erzähler Zeit verbringt.", "example": "Manchmal spiele ich mit Patrick und Jonas zusammen Fußball im Park.", "is_phrase": false, "pos": "Eigenname"}, "pitcher": {"def": "Der Pitcher ist beim Baseball der Spieler, der den Ball zum gegnerischen Schläger wirft. Er ist eine der wichtigsten Positionen im Spiel.", "example": "Der Pitcher war so gut, dass der Gegner keinen einzigen Ball treffen konnte.", "is_phrase": false, "pos": "Substantiv"}, "poster": {"def": "Ein Poster ist ein großes Bild oder eine große Zeichnung auf Papier, die man an die Wand hängt, um ein Zimmer zu schmücken. Poster zeigen oft bekannte Personen, Tiere, Filme oder andere Dinge, die man mag.", "example": "An der Wand in ihrem Zimmer hängen viele Poster von ihrer Lieblingsband.", "is_phrase": false, "pos": "Substantiv"}, "problem": {"def": "Eine schwierige Situation oder ein Nachteil, der etwas verhindert oder kompliziert macht. Hier bedeutet es, dass der Sport eine negative Wirkung hatte, die ein Hindernis war.", "example": "Das Problem mit dem frühen Aufstehen ist, dass ich abends nicht rechtzeitig einschlafen kann.", "is_phrase": false, "pos": "Substantiv"}, "probleme": {"def": "Schwierige Fragen oder Themen, über die man nachdenkt und spricht. Hier meint es ernste oder komplizierte Themen, die die Menschen beschäftigen.", "example": "Die beiden Freunde sitzen im Café und reden über Bücher, Politik und andere Probleme der Welt.", "is_phrase": false, "pos": "Substantiv"}, "pullis": {"def": "Pullover sind warme Kleidungsstücke aus Stoff, die man über den Kopf anzieht und die den Oberkörper bedecken. Im Text steht das Wort für einen einfachen, gemütlichen Kleidungsstil – das Mädchen ist nicht auffällig oder modebewusst gekleidet.", "example": "Im Herbst trägt sie am liebsten weiche Pullis in ruhigen Farben.", "is_phrase": false, "pos": "Substantiv (Plural)"}, "punk": {"def": "Punk ist eine Jugendkultur und Musikrichtung, die in den 1970er Jahren entstand. Menschen, die zur Punk-Szene gehören, lehnen gesellschaftliche Regeln ab und zeigen das oft durch besondere Kleidung, Frisuren und laute, schnelle Musik.", "example": "In den 1980er Jahren trafen sich viele Punks in der Innenstadt, um gemeinsam Musik zu hören.", "is_phrase": false, "pos": "Substantiv"}, "punkte": {"def": "Eine Zahl, die zeigt, wie gut jemand bei einem Spiel oder Test abgeschnitten hat. Hier spricht der Spieler über seine Punktzahl in einem Videospiel oder einer anderen Art von Spiel.", "example": "Am Ende des Spiels hatte sie 850 Punkte und gewann damit den ersten Platz.", "is_phrase": false, "pos": "Substantiv"}, "rechtzeitig": {"def": "Wenn man rechtzeitig zu einem Termin oder Ereignis ankommt, bedeutet das: man kommt nicht zu spät, sondern genau dann oder früh genug. In diesem Satz hofft jemand, vor Thanksgiving da zu sein.", "example": "Wir müssen jetzt losfahren, damit wir rechtzeitig zum Konzert ankommen.", "is_phrase": false, "pos": "Adverb"}, "reden": {"def": "Wenn zwei oder mehr Personen reden, sprechen sie miteinander und tauschen Gedanken oder Meinungen aus. Sie sagen Wörter und hören einander zu.", "example": "Die beiden Freunde reden jeden Abend über ihre Erlebnisse am Tag.", "is_phrase": false, "pos": "Verb"}, "redet": {"def": "Wenn jemand redet, spricht er mit anderen Menschen über etwas. Die Person sagt Wörter und teilt Informationen oder Gedanken mit.", "example": "Meine Mutter redet jeden Abend über ihre Arbeit.", "is_phrase": false, "pos": "Verb"}, "redeten": {"def": "Miteinander über ein bestimmtes Thema sprechen und Erfahrungen oder Meinungen austauschen. Hier sprechen die Spieler gemeinsam über das, was sie tun mussten, um in das Team aufgenommen zu werden.", "example": "Die Schüler saßen zusammen und redeten darüber, was sie in den Ferien erlebt hatten.", "is_phrase": false, "pos": "Verb"}, "regen": {"def": "Regen bedeutet Wasser, das in Tropfen vom Himmel fällt. Es ist ein Wetterereignis, das oft als romantische oder besondere Situation dargestellt wird.", "example": "Die zwei Freunde standen im Regen und lachten zusammen.", "is_phrase": false, "pos": "Substantiv"}, "richtig": {"def": "Das Wort 'richtig' wird hier benutzt, um etwas zu verstärken. Es bedeutet, dass das Gefühl oder die Sache sehr stark oder sehr echt war.", "example": "Als er den Hund sah,
